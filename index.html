<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AGA Tasks - Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151923;
            --border: #1e2533;
            --accent-blue: #5c7cfa;
            --accent-green: #10b981;
            --high: #ff4d4d;
            --medium: #f39c12;
            --pending: #e67e22;
            --text-main: #ffffff;
            --text-dim: #717b91;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text-main); min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .greeting h2 { font-family: 'Syne', sans-serif; font-size: 22px; }
        .greeting p { color: var(--accent-blue); font-size: 12px; font-weight: 500; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 11px; }

        /* MINI QUICK ACTIONS */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .action-btn { 
            background: linear-gradient(145deg, #1a1f2e, #151923); 
            border: 1px solid var(--border); 
            padding: 10px 15px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            cursor: pointer;
        }
        .action-btn span { font-size: 16px; }
        .action-btn label { font-size: 11px; font-weight: 700; color: #cbd5e1; cursor: pointer; }

        /* COMPACT ATTENDANCE BAR */
        .attendance-bar { width: 100%; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--accent-green); font-size: 13px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
