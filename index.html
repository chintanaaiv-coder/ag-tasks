<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AGA Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --input-fill: #e8f0fe; /* The specific blue-white tint from your SS */
            --accent-green: #10b981;
            --accent-blue: #6366f1;
            --text-dim: #717b91;
            --white: #ffffff;
        }

        /* App Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--white);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BRANDING: Using your PNG Logo */
        .logo-box {
            width: 110px;
            height: 110px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-box img {
            width: 85%; /* Perfect padding around your AG symbol */
            height: auto;
            /* Turns your black PNG into white for the dark theme */
            filter: brightness(0) invert(1);
            image-rendering: -webkit-optimize-contrast;
        }

        .brand-title {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.05;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* LOGIN FORM */
        .section-header {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 700;
            color: #3b4252;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .input-wrap { width: 100%; margin-bottom: 18px; }
        
        .label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
        }

        .f-input {
            width: 100%;
            background: var(--input-fill);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: #1e293b;
            font-size: 16px;
            font-weight: 600;
            outline: none;
        }

        .forgot-pass {
            text-align: right;
            font-size: 12px;
            color: #3b82f6;
            margin-top: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            transition: transform 0.1s ease;
        }
        .btn:active { transform: scale(0.98); }

        .btn-emp {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.35);
        }

        .btn-partner {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.25);
            margin-top: 10px;
        }

        .google-svg { width: 20px; height: 20px; }

        /* DIVIDER */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
        }
        .divider::before, .divider::after {
            content: ""; flex: 1; height: 1px; background: #1e2533;
        }
        .divider span { padding: 0 15px; }

        .footer-text { font-size: 13px; color: var(--text-dim); margin-top: 15px; }
        .blue-link { color: #3b82f6; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="logo-box">
            <img src="AGA Logo.png" alt="AGA Logo">
        </div>
        
        <h1 class="brand-title">Acharya<br>Gehlot &<br>Associates</h1>
        <p class="brand-subtitle">Task Assigner</p>

        <span class="section-header">Employee Login</span>

        <div class="input-wrap">
            <label class="label">Your Name</label>
            <input type="text" class="f-input" value="Heer patel">
        </div>

        <div class="input-wrap">
            <label class="label">Password</label>
            <input type="password" class="f-input" value="12345678">
            <p class="forgot-pass">Forgot Password?</p>
        </div>

        <button class="btn btn-emp">
            <span style="font-size:18px;">👤</span> Login as Employee
        </button>
        
        <p class="footer-text">New employee? <span class="blue-link">Register here →</span></p>

        <div class="divider"><span>OR</span></div>

        <button class="btn btn-partner">
