<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AGA Master</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; }
        .page { display: none; max-width: 400px; margin: 0 auto; }
        .active { display: block; }
        .box { background: #151923; border: 1px solid #1e2533; padding: 20px; border-radius: 15px; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #1e2533; background: #000; color: white; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .blue { background: #5c7cfa; color: white; }
        .green { background: #10b981; color: black; }
        .red { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <h1 style="text-align:center;">AGA TASKS</h1>
        <div class="box">
            <input type="text" placeholder="Employee Name">
            <input type="password" placeholder="Password">
            <button class="green">Employee Login</button>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <button class="blue" onclick="go(2)">Login as Partner</button>
        </div>
    </div>

    <div id="p2" class="page">
        <h1>Partner Login</h1>
        <div class="box">
            <p>chintan@acharyagehlot.com</p>
            <input type="password" id="pass" placeholder="Enter Password">
            <button class="blue" onclick="check()">Sign In</button>
            <button style="background:none; color:gray;" onclick="go(1)">← Back</button>
        </div>
    </div>

    <div id="p3" class="page">
        <div style="display:flex; justify-content:space-between;">
            <h2>Hello, Chintan</h2>
            <button class="red" style="width:auto; padding:5px 10px;" onclick="location.reload()">Logout</button>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="box" onclick="openM('mTeam')">Manage Team</button>
            <button class="box" onclick="openM('mAnal')">Task Analysis</button>
        </div>

        <div class="box">
            <div style="display:flex; justify-content:space-between;">
                <b style="color:#10b981;">Attendance</b>
                <span style="color:#5c7cfa; text-decoration:underline; cursor:pointer;" onclick="openM('mExp')">Export Excel</span>
            </div>
            <p style="color:gray; font-size:12px; margin-top:10px;">No employees active.</p>
        </div>
    </div>

    <div id="mExp" class="page" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); padding:20px;">
        <div class="box" style="margin-top:50px;">
            <h3>Export Data</h3>
            <input type="date"> <input type="date">
            <button class="green" onclick="alert('Exporting...'); closeM()">Download CSV</button>
            <button class="red" onclick="closeM()">Cancel</button>
        </div>
    </div>

    <div id="mTeam" class="page" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); padding:20px;">
        <div class="box" style="margin-top:50px;">
            <h3>Manage Team</h3>
            <div id="req1" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>new.staff@aga.com</span>
                <button style="width:auto; padding:2px 10px;" class="green" onclick="if(confirm('Approve?')){document.getElementById('req1').innerHTML='Approved';}">Approve</button>
            </div>
            <button class="blue" onclick="closeM()">Close</button>
        </div>
    </div>

    <script>
        function go(num) {
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'none';
            document.getElementById('p3').style.display = 'none';
            document.getElementById('p' + num).style.display = 'block';
        }
        function check() {
            var p = document.getElementById('pass').value;
            if(p === "Partner@AG2026") { go(3); } 
            else { alert("Wrong Password"); }
        }
        function openM(id) { document.getElementById(id).style.display = 'block'; }
        function closeM() { 
            document.getElementById('mExp').style.display = 'none';
            document.getElementById('mTeam').style.display = 'none';
        }
    </script>
</body>
</html>
