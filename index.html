<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AGA Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07090e; /* Even deeper black for high contrast */
            --input-bg: #e8f0fe;
            --accent-green: #10b981;
            --accent-blue: #5d69f6;
            --text-dim: #717b91;
            /* Logo Inversion Logic */
            --logo-filter: brightness(0) invert(1); 
        }

        .light-theme {
            --bg-dark: #ffffff;
            --input-bg: #f1f5f9;
            --logo-filter: none; /* Inverts back to original black */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-shell {
            width: 100%;
            max-width: 380px;
            padding: 60px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO BOX - Exact square proportion from your SS */
        .logo-box {
            width: 100px;
            height: 100px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .logo-box img {
            width: 82%;
            height: auto;
            filter: var(--logo-filter);
        }

        /* BRAND TITLE - Forced heavy/tight styling */
        .brand-title {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            line-height: 0.85; /* Extremely tight stack */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -2.5px; /* Tight letter spacing */
            margin-bottom: 12px;
        }

        .brand-subtitle {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 50px;
            font-weight: 600;
        }

        /* INPUTS */
        .section-tag {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 800;
            color: #3b4252;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .group { width: 100%; margin-bottom: 20px; }
        .label { font-size: 14px; color: #94a3b8; margin-bottom: 8px; display: block; font-weight: 500; }
        
        .f-input {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 18px;
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
            outline: none;
        }

        .forgot { text-align: right; font-size: 13px; color: #3b82f6; margin-top: 10px; cursor: pointer; font-weight: 600; }

        /* BUTTONS WITH NEON GLOW */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-green {
            background: var(--accent-green);
            color: #000; /* Dark text for high contrast on green */
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); /* Glow effect */
        }

        .btn-blue {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 25px rgba(93, 105, 246, 0.4); /* Glow effect */
            margin-top: 15px;
        }

        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            margin: 35px 0;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 800;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #1e2533; }
        .divider span { padding: 0 15px; }

        .footer-link { font-size: 13px; color: var(--text-dim); margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="logo-box">
            <img src="AGA Logo.png" alt="AGA Logo">
        </div>
        
        <h1 class="brand-title">Acharya<br>Gehlot &<br>Associates</h1>
        <p class="brand-subtitle">Task Assigner</p>

        <p class="section-tag">Employee Login</p>

        <div class="group">
            <label class="label">Your Name</label>
            <input type="text" class="f-input" value="Heer patel">
        </div>

        <div class="group">
            <label class="label">Password</label>
            <input type="password" class="f-input" value="12345678">
            <p class="forgot">Forgot Password?</p>
        </div>

        <button class="btn btn-green">
            <span style="font-size:20px;">👤</span> Login as Employee
        </button>
        
        <div class="footer-link">New employee? <span style="color:#3b82f6; font-weight:700;">Register here →</span></div>

        <div class="divider"><span>OR</span></div>

        <button class="btn btn-blue">
            <svg style="width:20px; height:20px;" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Login as Partner
        </button>
    </div>

</body>
</html>
