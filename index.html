<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>AGA Tasks — Final</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0f;
            --surface: #0f1219;
            --accent: #6366f1;
            --green: #10b981;
            --text: #dde4f0;
            --muted: #4a5680;
            --input-bg: #e8f0fe; /* Keeping your specific light-blue fields */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: "DM Sans", sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* PHONE SHELL Structure from your code */
        .phone {
            width: 100%;
            max-width: 380px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* NOTCH from your provided code */
        .phone-notch {
            width: 88px;
            height: 24px;
            background: #090c12;
            border-radius: 0 0 16px 16px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }
        .n-cam { width: 7px; height: 7px; border-radius: 50%; background: #1a2035; }
        .n-spk { width: 36px; height: 3px; border-radius: 2px; background: #1a2035; }

        .app-content {
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BRANDING: Using your exact Logo Box style */
        .login-logo {
            width: 100px;
            height: 100px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .login-logo img {
            width: 80%;
            height: auto;
            /* Using Invert to make the black symbol white for dark theme */
            filter: brightness(0) invert(1);
        }

        .login-title {
            font-family: "Syne", sans-serif;
            font-size: 34px;
            font-weight: 800;
            line-height: 0.95;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 5px;
        }

        .login-sub {
            font-family: "Syne", sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 40px;
        }

        /* FORM SECTION */
        .sec-label {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 700;
            color: #3b4252;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .input-wrap { width: 100%; margin-bottom: 20px; }
        .f-label { font-size: 14px; color: #94a3b8; margin-bottom: 8px; display: block; font-weight: 500; }
        
        .f-inp {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
            outline: none;
        }

        .forgot-link {
            text-align: right;
            font-size: 13px;
            color: #3b82f6;
            margin-top: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* BUTTONS WITH NEON GLOW */
        .app-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-emp {
            background: var(--green);
            color: #fff;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }
