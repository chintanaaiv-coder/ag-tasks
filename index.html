<style>
/* ═══════════════════════════════════════
   YOUR ORIGINAL PREMIUM DESIGN
═══════════════════════════════════════ */
:root {
  --bg: #0a0d16; --surface: #111827; --card: #1a2235; --card2: #1e2a3a;
  --border: #2a3550; --accent: #6366f1; --accent2: #818cf8; --green: #10b981;
  --red: #ef4444; --yellow: #f59e0b; --cyan: #06b6d4; --text: #f1f5f9;
  --text2: #94a3b8; --text3: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
#app { min-height: 100vh; max-width: 430px; margin: 0 auto; position: relative; background: var(--bg); }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; background: var(--bg); position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 22px; font-weight: 800; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* LOGIN PAGE */
.login-page { min-height: 100vh; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; }
.login-logo { width: 72px; height: 72px; margin-bottom: 16px; background: #fff; border-radius: 16px; padding: 8px; display: flex; align-items: center; justify-content: center; }
.login-logo img { width: 100%; height: 100%; object-fit: contain; }
.login-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 32px; }

/* FORM ELEMENTS */
.f-group { margin-bottom: 14px; width: 100%; }
.f-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; display: block; }
.f-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; font-size: 14px; color: var(--text); font-family: "Inter", sans-serif; outline: none; }

/* BUTTONS */
.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #fff; }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 20px; font-size: 13px; z-index: 500; display: none; }
.toast.show { display: block; }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }
</style>
