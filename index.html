<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>AGA Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080a12;--surface:#111420;--card:#1a1f2e;--border:#262c40;
  --accent:#6366f1;--green:#10b981;--text:#ffffff;--muted:#8892aa;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.mobile-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 40px 24px; text-align: center; }

/* BRANDING SECTION */
.logo-box { width: 80px; height: 80px; background: #000; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 12px; }
.logo-box img { width: 70%; }
.company-name { font-family: "Syne", sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; text-transform: uppercase; }
.sub-title { color: var(--muted); font-size: 14px; margin-bottom: 40px; letter-spacing: 1px; }

/* FORMS */
.login-section { text-align: left; }
.f-lbl { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
.f-inp { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: white; margin-bottom: 15px; font-size: 15px; outline: none; }
.f-inp:focus { border-color: var(--accent); }

/* BUTTONS */
.btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; transition: 0.2s; }
.btn-emp { background: var(--green); color: white; }
.btn-partner { background: var(--accent); color: white; }
.btn:active { transform: scale(0.97); }

.reg-link { font-size: 12px; color: var(--muted); text-align: center; margin-top: 5px; }
.reg-link span { color: var(--accent); cursor: pointer; font-weight: 700; }
.divider { margin: 25px 0; display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; }
.line { flex: 1; height: 1px; background: var(--border); }

/* DASHBOARD STYLES */
#dashboard { display: none; padding: 20px; }
.admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-top: 20px; text-align: left; }
.admin-card h3 { font-family: "Syne", sans-serif; color: var(--accent); margin-bottom: 15px; font-size: 16px; }
.user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.user-row:last-child { border: none; }
.approve-btn { background: var(--green); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div class="mobile-container" id="loginPage">
    <div class="logo-box">
        <svg viewBox="0 0 100 100" width="50" height="50">
            <path d="M20 80 L50 20 L80 80 M35 60 L65 60" stroke="white" stroke-width="8" fill="none"/>
        </svg>
    </div>
    
    <div class="company-name">Acharya<br>Gehlot &<br>Associates</div>
    <div class="sub-title">Task Assigner</div>

    <div class="login-section">
        <label class="f-lbl">Employee Name</label>
        <input type="text" id="userInput" class="f-inp" placeholder="Name">
        
        <label class="f-lbl">Password</label>
        <input type="password" id="passInput" class="f-inp" placeholder="••••••••">
        
        <div style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
            <a href="#" style="font-size: 11px; color: var(--accent); text-decoration: none;">Forgot Password?</a>
        </div>
        
        <button class="btn btn-emp" onclick="handleAuth('employee')">
            <span>👤</span> Login as Employee
        </button>
        
        <div class="reg-link">New employee? <span>Register here →</span></div>

        <div class="divider">
            <div class="line"></div> OR <div class="line"></div>
        </div>

        <button class="btn btn-partner" onclick="handleAuth('partner')">
            <span>G</span> Login as Partner
        </button>
    </div>
</div>

<div class="mobile-container" id="dashboard">
    <h2 id="dashTitle" style="font-family: 'Syne'; margin-bottom: 10px;"></h2>
    <p id="dashStatus" style="color: var(--muted); font-size: 12px;"></p>
    
    <div id="partnerTools" style="display: none;">
        <div class="admin-card">
            <h3>Pending Approvals</h3>
            <div id="approvalList">No new requests.</div>
        </div>
    </div>

    <button onclick="location.reload()" style="margin-top: 40px; color: var(--red); background: none; border: none; font-weight: bold; cursor: pointer;">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyC4oF4oNzPtQNPaKQaOnnJeIFKXLNMOA9g",
    authDomain: "ag-task-assigner.firebaseapp.com",
    projectId: "ag-task-assigner",
    storageBucket: "ag-task-assigner.appspot.com",
    messagingSenderId: "694340088537",
    appId: "1:694340088537:web:1f14fb2bf3b62d5c7ae7bc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const PARTNER_ID = "chintan@acharyagehlot.com";

window.handleAuth = (role) => {
    const pass = document.getElementById('passInput').value;
    const name = document.getElementById('userInput').value;

    if (role === 'partner') {
        // Checking your Partner password
        if (pass === "Partner@AG2026") {
            showDashboard('partner', "Chintan");
        } else {
            alert("Incorrect Partner Password");
        }
    } else {
        // Employee logic
        if (!name) return alert("Please enter your name");
        showDashboard('employee', name);
    }
};

function showDashboard(role, name) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dashTitle').innerText = "Hello, " + name;

    if (role === 'partner') {
        document.getElementById('dashStatus').innerText = "Logged in as " + PARTNER_ID;
        document.getElementById('partnerTools').style.display = 'block';
        loadApprovals();
    } else {
        document.getElementById('dashStatus').innerText = "Waiting for partner approval...";
    }
}

function loadApprovals() {
    onSnapshot(collection(db, "users"), (snap) => {
        const listDiv = document.getElementById('approvalList');
        let html = "";
        snap.forEach(d => {
            const user = d.data();
            if (!user.isApproved && user.role !== 'partner') {
                html += `
                    <div class="user-row">
                        <span style="font-size:13px;">${user.email || 'New User'}</span>
                        <button class="approve-btn" onclick="approveUser('${d.id}')">Approve</button>
                    </div>
                `;
            }
        });
        listDiv.innerHTML = html || "No pending approvals.";
    });
}

window.approveUser = async (id) => {
    await updateDoc(doc(db, "users", id), { isApproved: true });
    alert("Employee Approved!");
};
</script>

</body>
</html>
