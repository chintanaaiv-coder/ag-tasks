<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AGA Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #141824;
            --border: #1e2533;
            --accent-blue: #6366f1;
            --accent-green: #10b981;
            --text-main: #ffffff;
            --text-dim: #717b91;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .phone-frame {
            width: 100%;
            max-width: 390px;
            padding: 40px 25px;
            text-align: center;
        }

        /* LOGO & BRANDING */
        .logo-container {
            width: 100px;
            height: 100px;
            background: #000;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }
        .logo-container img { width: 80%; filter: brightness(1.2); }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .app-title {
            font-size: 18px;
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        /* INPUT FIELDS */
        .section-label {
            display: block;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #3b4660;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
        .f-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #3b5bdb;
            margin-top: 10px;
            margin-bottom: 25px;
            text-decoration: none;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: 0.3s ease;
        }
        .btn-employee { 
            background: var(--accent-green); 
            color: #000; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        .btn-partner { 
            background: #5c7cfa; 
            color: white; 
            box-shadow: 0 0 20px rgba(92, 124, 250, 0.2);
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .register-text { font-size: 13px; color: var(--text-dim); margin-top: 10px; }
        .register-text span { color: #3b5bdb; font-weight: 700; cursor: pointer; }

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
        }
        .line { flex: 1; height: 1px; background: var(--border); }

        /* SCREENS */
        .screen { display: none; }
        .active-screen { display: block; }

        /* DASHBOARD TABLES */
        .approval-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .approve-btn { background: var(--accent-green); border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div id="loginScreen" class="screen active-screen">
            <div class="logo-container">
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <path d="M20 85 L50 15 L80 85 M35 60 L65 60" stroke="white" stroke-width="10" fill="none"/>
                </svg>
            </div>
            <h1 class="brand-name">Acharya<br>Gehlot &<br>Associates</h1>
            <p class="app-title">Task Assigner</p>

            <span class="section-label">Employee Login</span>
            
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="loginName" class="f-input" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass" class="f-input" placeholder="Enter password">
            </div>

            <a href="#" class="forgot-pass">Forgot Password?</a>

            <button class="btn btn-employee" onclick="doAuth('employee')">
                <span>👤</span> Login as Employee
            </button>

            <p class="register-text">New employee? <span onclick="toggleScreen('regScreen')">Register here →</span></p>

            <div class="divider">
                <div class="line"></div> OR <div class="line"></div>
            </div>

            <button class="btn btn-partner" onclick="doAuth('partner')">
                <span>G</span> Login as Partner
            </button>
        </div>

        <div id="regScreen" class="screen">
            <h2 class="brand-name">Join Team</h2>
            <p class="app-title" style="margin-bottom:20px;">Create your account</p>
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" class="f-input" placeholder="Name">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" class="f-input" placeholder="Email">
            </div>
            <div class="input-group">
                <label>Set Password</label>
                <input type="password" id="regPass" class="f-input" placeholder="••••••••">
            </div>

            <button class="btn btn-employee" onclick="handleRegister()" style="margin-top:20px;">Complete Registration</button>
            <p class="register-text">Already have account? <span onclick="toggleScreen('loginScreen')">Back to Login</span></p>
        </div>

        <div id="dashScreen" class="screen">
            <h2 id="welcomeName" class="brand-name"></h2>
            <p id="roleTag" class="app-title"></p>

            <div id="partnerOnly" style="display:none;">
                <div class="approval-card">
                    <h3 style="font-size:14px; margin-bottom:15px; color:var(--accent-blue);">Staff Approvals</h3>
                    <div id="pendingUsers">No pending requests.</div>
                </div>
            </div>

            <button class="btn btn-partner" onclick="location.reload()" style="margin-top:40px; background:#ff4444;">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4oF4oNzPtQNPaKQaOnnJeIFKXLNMOA9g",
            authDomain: "ag-task-assigner.firebaseapp.com",
            projectId: "ag-task-assigner",
            storageBucket: "ag-task-assigner.appspot.com",
            messagingSenderId: "694340088537",
            appId: "1:694340088537:web:1f14fb2bf3b62d5c7ae7bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PARTNER_EMAIL = "chintan@acharyagehlot.com";

        window.toggleScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        };

        window.doAuth = (role) => {
            const pass = document.getElementById('loginPass').value;
            const name = document.getElementById('loginName').value;

            if (role === 'partner') {
                if (pass === "Partner@AG2026") {
                    enterDash("Chintan", "Partner");
                } else {
                    alert("Incorrect Partner Password");
                }
            } else {
                if (!name || !pass) return alert("Enter login details");
                enterDash(name, "Employee");
            }
        };

        window.handleRegister = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            if(!name || !email) return alert("Fill all fields");

            await setDoc(doc(db, "users", email), {
                name: name,
                email: email,
                pass: pass,
                isApproved: false,
                role: 'employee'
            });

            alert("Registration successful! Wait for Chintan to approve your account.");
            toggleScreen('loginScreen');
        };

        function enterDash(name, role) {
            toggleScreen('dashScreen');
            document.getElementById('welcomeName').innerText = "Hello, " + name;
            document.getElementById('roleTag').innerText = role;

            if (role === 'Partner') {
                document.getElementById('partnerOnly').style.display = 'block';
                syncApprovals();
            }
        }

        function syncApprovals() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('pendingUsers');
                let html = "";
                snap.forEach(d => {
                    const u = d.data();
                    if (!u.isApproved && u.role !== 'partner') {
                        html += `<div class="user-item">
                            <span>${u.name}</span>
                            <button class="approve-btn" onclick="approveUser('${d.id}')">Approve</button>
                        </div>`;
                    }
