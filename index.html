<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0d16"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<title>AGA Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════
   THEME VARIABLES
═══════════════════════════════════════ */
:root {
  --bg: #0a0d16;
  --surface: #111827;
  --card: #1a2235;
  --card2: #1e2a3a;
  --border: #2a3550;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --cyan: #06b6d4;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --badge-high-bg: rgba(239,68,68,0.15);
  --badge-high: #ef4444;
  --badge-med-bg: rgba(245,158,11,0.15);
  --badge-med: #f59e0b;
  --badge-low-bg: rgba(16,185,129,0.15);
  --badge-low: #10b981;
}
:root.light {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --card: #e8edf5;
  --card2: #dde3ef;
  --border: #cbd5e1;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: "Inter", sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ═══ LAYOUT ═══ */
#app {
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  background: var(--bg);
}

/* ═══ TOPBAR ═══ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
  flex-wrap: wrap; gap: 8px 0;
}
.topbar-title { font-size: 22px; font-weight: 800; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.topbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.logout-btn {
  background: var(--red); color: #fff; border: none;
  border-radius: 10px; padding: 8px 16px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: "Inter", sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ═══ LOGIN PAGE ═══ */
.login-page {
  min-height: 100vh; padding: 40px 24px 40px;
  padding-top: calc(40px + env(safe-area-inset-top, 0px));
  display: flex; flex-direction: column; align-items: center;
}
.login-logo {
  width: 72px; height: 72px; margin-bottom: 16px;
  background: #fff; border-radius: 16px; padding: 8px;
  display: flex; align-items: center; justify-content: center;
}
.login-logo img { width: 100%; height: 100%; object-fit: contain; }
.login-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 32px; }
.login-form { width: 100%; }
.theme-toggle-row {
  display: flex; justify-content: flex-end; width: 100%; margin-bottom: 20px;
}
.theme-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px; cursor: pointer;
  font-size: 12px; color: var(--text2); font-weight: 500;
}

/* ═══ FORM ELEMENTS ═══ */
.f-group { margin-bottom: 14px; }
.f-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.f-input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px; font-size: 14px;
  color: var(--text); font-family: "Inter", sans-serif;
  -webkit-text-fill-color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.f-input:focus { border-color: var(--accent); }
.f-input::placeholder { color: var(--text3); }
.f-input:-webkit-autofill { -webkit-text-fill-color: var(--text) !important; -webkit-box-shadow: 0 0 0 1000px var(--card) inset !important; }
:root.light .f-input:-webkit-autofill { -webkit-text-fill-color: #0f172a !important; -webkit-box-shadow: 0 0 0 1000px #e8edf5 inset !important; }
select.f-input { cursor: pointer; }
select.f-input option { background: var(--card); color: var(--text); }
input[type=date].f-input { cursor: pointer; }
input[type=date].f-input::-webkit-calendar-picker-indicator {
  filter: invert(0.8);
  cursor: pointer;
  opacity: 0.8;
  font-size: 18px;
  padding: 2px;
}
:root.light input[type=date].f-input::-webkit-calendar-picker-indicator {
  filter: none;
  opacity: 0.6;
}
textarea.f-input { min-height: 80px; resize: vertical; }

/* ═══ BUTTONS ═══ */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: "Inter", sans-serif; display: flex;
  align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-yellow { background: var(--yellow); color: #fff; }
.btn-cyan { background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.4); color: var(--cyan); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text2); }
.btn-sm { padding: 8px 14px; font-size: 12px; width: auto; border-radius: 8px; }
.btn-mb { margin-bottom: 10px; }

/* ═══ CARDS ═══ */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
}
.card-dark { background: var(--card2); }

/* ═══ BADGES ═══ */
.badge {
  display: inline-flex; align-items: center; padding: 3px 9px;
  border-radius: 6px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-high { background: var(--badge-high-bg); color: var(--badge-high); }
.badge-medium { background: var(--badge-med-bg); color: var(--badge-med); }
.badge-low { background: var(--badge-low-bg); color: var(--badge-low); }
.badge-pending { background: rgba(245,158,11,0.15); color: var(--yellow); }
.badge-done { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-partner { background: rgba(99,102,241,0.15); color: var(--accent2); }
.badge-senior { background: rgba(245,158,11,0.15); color: var(--yellow); }
.badge-leave { background: rgba(6,182,212,0.15); color: var(--cyan); }

/* ═══ FILTER PILLS ═══ */
.filter-row { display: flex; gap: 8px; padding: 0 20px 14px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--text2);
  cursor: pointer; white-space: nowrap; font-family: "Inter", sans-serif;
}
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ═══ TASK CARD ═══ */
.task-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin: 0 20px 10px;
}
.task-card.from-partner { border-left: 3px solid var(--accent); }
.task-card.from-senior { border-left: 3px solid var(--yellow); }
.task-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.task-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.task-desc { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
.task-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text3); align-items: center; flex-wrap: wrap; }
.task-meta span { display: flex; align-items: center; gap: 4px; }
.task-assign { font-size: 11px; color: var(--text2); margin-top: 6px; }
.task-actions { display: flex; gap: 6px; margin-top: 10px; }
.act-btn {
  width: 32px; height: 32px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  border: 1px solid var(--border); background: var(--card2); font-size: 14px;
}

/* ═══ STATS ROW ═══ */
.stats-row { display: flex; gap: 10px; padding: 0 20px 14px; }
.stat-card {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; text-align: center;
}
.stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-num.yellow { color: var(--yellow); }
.stat-num.green { color: var(--green); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ═══ SECTION ═══ */
.section { padding: 0 20px 14px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

/* ═══ ATTENDANCE ═══ */
.att-date-select {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
}
.att-section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.att-btn-row { display: flex; gap: 10px; }
.att-in {
  flex: 1; padding: 16px; border-radius: 12px;
  background: rgba(16,185,129,0.15); border: 2px solid rgba(16,185,129,0.4);
  color: var(--green); font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: "Inter", sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.att-out {
  flex: 1; padding: 16px; border-radius: 12px;
  background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.4);
  color: var(--red); font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: "Inter", sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.att-in:disabled, .att-out:disabled { opacity: 0.4; cursor: not-allowed; }
.att-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; line-height: 1.5; }

/* ═══ OVERLAY ═══ */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.overlay-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px 22px; width: 320px;
  max-width: 90vw; text-align: center;
}
.ov-icon { font-size: 36px; margin-bottom: 10px; }
.ov-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.ov-msg { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.ov-detail {
  font-size: 12px; color: var(--text2); background: var(--card);
  border-radius: 10px; padding: 12px; margin-bottom: 16px;
  text-align: left; line-height: 1.8;
}
.ov-detail .lbl { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.ov-btns { display: flex; gap: 8px; }
.ov-no {
  flex: 1; padding: 11px; border-radius: 10px; background: var(--card);
  border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: "Inter", sans-serif;
}
.ov-yes {
  flex: 2; padding: 11px; border-radius: 10px; border: none;
  color: #fff; cursor: pointer; font-size: 13px; font-weight: 700;
  font-family: "Inter", sans-serif;
}
.ov-yes.success { background: var(--green); }
.ov-yes.danger { background: var(--red); }
.ov-yes.primary { background: var(--accent); }

/* ═══ PIN OVERLAY ═══ */
.pin-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.pin-overlay.open { opacity: 1; pointer-events: all; }
.pin-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 28px 24px; width: 300px;
  max-width: 90vw; text-align: center;
}
.pin-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.pin-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background 0.15s; }
.pin-dot.filled { background: var(--accent); }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 230px; margin: 0 auto 16px; }
.pin-key {
  padding: 16px; border-radius: 12px; background: var(--card);
  border: 1px solid var(--border); color: var(--text); font-size: 20px;
  font-weight: 700; cursor: pointer; font-family: "Inter", sans-serif;
  transition: background 0.1s;
}
.pin-key:active { background: var(--border); }
.pin-key.del { font-size: 16px; }
.pin-err { color: var(--red); font-size: 12px; min-height: 18px; margin-bottom: 8px; }
.pin-cancel { font-size: 12px; color: var(--text3); cursor: pointer; text-decoration: underline; }

/* ═══ TOAST ═══ */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 20px; font-size: 13px;
  color: var(--text); z-index: 500; opacity: 0;
  transition: all 0.3s; pointer-events: none;
  white-space: nowrap; max-width: 88vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { border-color: var(--red); color: var(--red); }
.toast.ok { border-color: var(--green); color: var(--green); }

/* ═══ LEAVE CARD ═══ */
.leave-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
}
.leave-status-pending { color: var(--yellow); font-size: 11px; font-weight: 700; }
.leave-status-approved { color: var(--green); font-size: 11px; font-weight: 700; }
.leave-status-rejected { color: var(--red); font-size: 11px; font-weight: 700; }

/* ═══ MANAGE USERS ═══ */
.user-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.user-card.pending { border-left: 3px solid var(--yellow); }
.user-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-size: 16px; font-weight: 700;
  color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 14px; font-weight: 700; color: var(--text); }
.user-meta { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.6; }
.user-actions { display: flex; flex-direction: column; gap: 6px; }

/* ═══ BACK BUTTON ═══ */
.back-row { display: flex; align-items: center; gap: 12px; padding: 16px 20px 8px; padding-top: calc(16px + env(safe-area-inset-top, 0px)); position: sticky; top: 0; z-index: 50; background: var(--bg); }
.back-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text2); flex-shrink: 0;
}
.page-title { font-size: 22px; font-weight: 800; color: var(--text); }
.page-sub { font-size: 12px; color: var(--text2); }

/* ═══ NOTIFICATION DOT ═══ */
.notif-dot {
  position: absolute; top: -3px; right: -3px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red); border: 2px solid var(--bg);
}
.rel { position: relative; }

/* ═══ REPORT TABLE ═══ */
.table-head {
  display: grid; grid-template-columns: 1.5fr 1fr 0.8fr 0.6fr 1.5fr;
  gap: 4px; padding: 8px 12px; font-size: 9px; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.table-row {
  display: grid; grid-template-columns: 1.5fr 1fr 0.8fr 0.6fr 1.5fr;
  gap: 4px; padding: 9px 12px; font-size: 11px; color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.table-row:last-child { border-bottom: none; }

/* ═══ OR DIVIDER ═══ */
.or-row { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
.or-line { flex: 1; height: 1px; background: var(--border); }
.or-text { font-size: 11px; color: var(--text3); font-weight: 600; }

/* ═══ INFO BOX ═══ */
.info-box {
  background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25);
  border-radius: 10px; padding: 10px 14px; font-size: 12px;
  color: var(--yellow); margin-bottom: 14px; line-height: 1.6;
}
.success-box {
  background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25);
  border-radius: 10px; padding: 10px 14px; font-size: 12px;
  color: var(--green); margin-bottom: 14px; line-height: 1.6;
}

/* ═══ PENDING BANNER ═══ */
.pending-banner {
  margin: 0 20px 14px; background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.25); border-radius: 14px;
  padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
}
.pending-banner-icon { font-size: 24px; }
.pending-banner-text { flex: 1; }
.pending-banner-title { font-size: 13px; font-weight: 700; color: var(--yellow); }
.pending-banner-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ═══ CALENDAR ═══ */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-top: 10px; }
.cal-day-name { text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); padding: 4px 0; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500;
}
.cal-day:hover { background: var(--card2); }
.cal-day.today { border: 1px solid var(--accent); color: var(--accent); font-weight: 700; }
.cal-day.selected { background: var(--accent); color: #fff; font-weight: 700; }
.cal-day.marked-in { background: rgba(16,185,129,0.2); color: var(--green); }
.cal-day.marked-out { background: rgba(239,68,68,0.2); color: var(--red); }
.cal-day.marked-both { background: rgba(16,185,129,0.3); color: var(--green); border: 1px solid var(--green); }
.cal-day.empty { cursor: default; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-nav-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; color: var(--text2); font-size: 14px; }
.cal-month { font-size: 14px; font-weight: 700; color: var(--text); }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM OVERLAY -->
<div class="overlay" id="confirmOverlay">
  <div class="overlay-box">
    <div class="ov-icon" id="ovIcon"></div>
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-msg" id="ovMsg"></div>
    <div class="ov-detail" id="ovDetail" style="display:none"></div>
    <div class="ov-btns">
      <button class="ov-no" onclick="closeConfirm()">✕ No, Cancel</button>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const app=initializeApp(cfg);
const db=getFirestore(app);
let messaging=null;
try{messaging=getMessaging(app);}catch(e){console.log("FCM not supported in this browser");}
const VAPID_KEY="BDnxskWRpK1rgHfNEBuC4odpbCBuLO_e2Ay3YCUA3k6i2n7Q60731FtIoAE3jSceoSG4IS2Ppno_7bpwUwXkPW0";
// Seed default employees
async function seed(){
  const defaults=[
    {code:"001",name:"Heer Patel",      email:"heer@aga.com",    mobile:"",password:"heerpatel",      approved:true,pendingApproval:false,registered:true},
    {code:"002",name:"Bhavana Shinde",  email:"bhavana@aga.com", mobile:"",password:"bhavanashinde",  approved:true,pendingApproval:false,registered:true},
    {code:"003",name:"Moksha Jain",     email:"moksha@aga.com",  mobile:"",password:"mokshajain",     approved:true,pendingApproval:false,registered:true},
    {code:"004",name:"Dhanisha Solanki",email:"dhanisha@aga.com",mobile:"",password:"dhanishasolanki",approved:true,pendingApproval:false,registered:true},
    {code:"005",name:"Prapti Padhya",   email:"prapti@aga.com",  mobile:"",password:"praptipadhya",   approved:true,pendingApproval:false,registered:true},
  ];
  for(const e of defaults) await setDoc(doc(db,"employees",e.code),e);
}
// Load partner password from Firebase
onSnapshot(doc(db,"settings","config"),snap=>{
  if(snap.exists()){
    const d=snap.data();
    if(d.partnerPass&&window.S) S.partnerPass=d.partnerPass;
  }
});
onSnapshot(collection(db,"employees"),snap=>{
  if(snap.empty){seed();return;}
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  // If any default employee missing approved field, fix them
  const needsFix=l.filter(e=>e.approved===undefined&&!e.pendingApproval);
  needsFix.forEach(async e=>{
    const fixed={...e,approved:true,pendingApproval:false};
    await setDoc(doc(db,"employees",e.code||e.id),fixed);
  });
  if(window.S){
    const fbIds=new Set(l.map(e=>e.code||e.id));
    const localOnly=S.employees.filter(e=>!fbIds.has(e.code)&&!fbIds.has(e.id));
    S.employees=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"tasks"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S) {
    const fbIds=new Set(l.map(t=>t.id));
    const localOnly=S.tasks.filter(t=>!fbIds.has(t.id));
    S.tasks=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"attendance"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S) {
    const fbIds=new Set(l.map(a=>a.id));
    const localOnly=S.attendance.filter(a=>!fbIds.has(a.id));
    S.attendance=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"leaves"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S){
    const fbIds=new Set(l.map(lv=>lv.id));
    const localOnly=S.leaves.filter(lv=>!fbIds.has(lv.id));
    const prev=S.leaves||[];
    // Notify employee if their leave just got approved
    if(S.user?.role==="employee"){
      l.forEach(lv=>{
        if(lv.empName===S.user.name&&lv.status==="approved"){
          const was=prev.find(p=>p.id===lv.id);
          if(was&&was.status!=="approved") toast("🎉 Your leave has been approved!","ok");
        }
      });
    }
    S.leaves=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"notifications"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S && window.S.user){
    if(window._fbNotifsLoaded){
      const myName=S.user.name||"";
      const isBoss=S.user.role==="boss";
      const isSenior=["Heer Patel","Bhavana Shinde"].includes(myName);
      const oldIds=new Set(S.notifications.map(n=>n.id));
      l.forEach(n=>{
        if(n.read||oldIds.has(n.id)) return;
        const isForMe=(isBoss&&n.to==="partner")||(n.to===myName)||(isSenior&&n.to==="seniors");
        if(isForMe) swNotify("AGA Tasks",n.body);
      });
    }
    window._fbNotifsLoaded=true;
  }
  if(window.S) S.notifications=l;
  if(window.R) R();
});
onSnapshot(query(collection(db,"chats"),orderBy("createdAt","asc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S && window.S.user){
    if(window._fbChatsLoaded){
      const myName=S.user.name||(S.user.role==="boss"?"Chintan":"");
      const oldIds=new Set(S.chatMessages.map(m=>m.id));
      l.forEach(m=>{
        if(oldIds.has(m.id)||m.sender===myName) return;
        const isForMe=m.channel==="team"||(m.channel===myName)||(m.to===myName);
        if(isForMe) swNotify(m.channel==="team"?"AGA Team Chat 💬":m.sender+" 💬",m.text);
      });
    }
    window._fbChatsLoaded=true;
  }
  if(window.S) S.chatMessages=l;
  if(window.R) R();
});
// Expenses listener
onSnapshot(query(collection(db,"expenses"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S && window.S.user){
    if(window._fbExpLoaded){
      const isBoss=S.user.role==="boss";
      const myName=S.user.name||"";
      const oldIds=new Set(S.expenses.map(e=>e.id));
      l.forEach(e=>{
        if(oldIds.has(e.id)) return;
        if(isBoss && e.status==="pending") swNotify("💰 New Expense",e.empName+" submitted ₹"+Number(e.amount).toLocaleString("en-IN")+" ("+e.category+")");
        if(e.empName===myName && (e.status==="approved"||e.status==="rejected")) swNotify("💰 Expense "+e.status,e.status==="approved"?"Your expense ₹"+Number(e.amount).toLocaleString("en-IN")+" was approved ✅":"Your expense ₹"+Number(e.amount).toLocaleString("en-IN")+" was rejected ❌");
      });
    }
    window._fbExpLoaded=true;
  }
  if(window.S) S.expenses=l;
  if(window.R) R();
});
window.FB={
  saveTask:   async t =>setDoc(doc(db,"tasks",t.id),t),
  updateTask: async(id,d)=>updateDoc(doc(db,"tasks",id),d),
  deleteTask: async id =>deleteDoc(doc(db,"tasks",id)),
  saveEmp:    async e =>setDoc(doc(db,"employees",e.code),e),
  updateEmp:  async(c,d)=>updateDoc(doc(db,"employees",c),d),
  deleteEmp:  async c =>deleteDoc(doc(db,"employees",c)),
  saveAtt:    async a =>setDoc(doc(db,"attendance",a.id),a),
  deleteAtt:  async id =>deleteDoc(doc(db,"attendance",id)),
  saveLeave:  async l =>setDoc(doc(db,"leaves",l.id),l),
  updateLeave:async(id,d)=>updateDoc(doc(db,"leaves",id),d),
  deleteLeave:async id =>deleteDoc(doc(db,"leaves",id)),
  saveNotif:  async n =>setDoc(doc(db,"notifications",n.id),n),
  deleteNotif:async id =>deleteDoc(doc(db,"notifications",id)),
  saveChat:   async m =>setDoc(doc(db,"chats",m.id),m),
  deleteChat: async id =>deleteDoc(doc(db,"chats",id)),
  saveSetting:async(id,d)=>setDoc(doc(db,"settings",id),d,{merge:true}),
  saveExpense:async e=>setDoc(doc(db,"expenses",e.id),e),
  updateExpense:async(id,d)=>updateDoc(doc(db,"expenses",id),d),
  deleteExpense:async id=>deleteDoc(doc(db,"expenses",id)),
  savePushToken:async(tokenId,data)=>setDoc(doc(db,"pushTokens",tokenId),data),
};

// Expose FCM registration function to regular script
window._doFCMRegister=async function(userName,role){
  if(!messaging){console.log("FCM: messaging is null");return;}
  try{
    // Register SW explicitly for FCM
    let sw;
    if("serviceWorker" in navigator){
      sw=await navigator.serviceWorker.register("./sw.js",{scope:"./"});
      await navigator.serviceWorker.ready;
    }
    const token=await getToken(messaging,{vapidKey:VAPID_KEY,serviceWorkerRegistration:sw});
    if(token){
      await setDoc(doc(db,"pushTokens",token),{token:token,userName:userName,role:role,updatedAt:Date.now()});
      console.log("FCM token registered for",userName,"token:",token.substring(0,20)+"...");
    }else{
      console.log("FCM: getToken returned null");
    }
  }catch(e){
    console.log("FCM registration error:",e.message||e);
  }
};

// Handle foreground FCM messages
if(messaging){
  onMessage(messaging,(payload)=>{
    const title=payload.notification?.title||payload.data?.title||"AGA Tasks";
    const body=payload.notification?.body||payload.data?.body||"";
    if(window.swNotify) window.swNotify(title,body);
  });
}

// Module runs AFTER regular script, so if user was already restored from session, register token now
if(window.S && window.S.user){
  // Request permission and register in one flow
  (async()=>{
    try{
      if(!messaging) return;
      if(!("Notification" in window)) return;
      let perm=Notification.permission;
      if(perm==="default") perm=await Notification.requestPermission();
      if(perm!=="granted") return;
      const u=window.S.user;
      const userName=u.role==="boss"?"Chintan":u.name;
      await window._doFCMRegister(userName,u.role);
    }catch(e){console.log("FCM auto-register failed:",e);}
  })();
}
</script>

// Session persistence — uses localStorage + cookie + IndexedDB (iOS PWAs wipe localStorage & cookies)
function setCookie(k,v,days){
  const d=new Date();d.setTime(d.getTime()+(days||365)*86400000);
  document.cookie=k+"="+encodeURIComponent(v)+";expires="+d.toUTCString()+";path=/;SameSite=Lax";
}
function getCookie(k){
  const m=document.cookie.match(new RegExp("(^| )"+k+"=([^;]+)"));
  return m?decodeURIComponent(m[2]):null;
}
function delCookie(k){document.cookie=k+"=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/;SameSite=Lax";}

// IndexedDB helpers (most persistent on iOS)
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("agaDB",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("kv");
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idbSet(k,v){
  try{const db=await idbOpen();const tx=db.transaction("kv","readwrite");tx.objectStore("kv").put(v,k);await new Promise(r=>{tx.oncomplete=r;});}catch(e){}
}
async function idbGet(k){
  try{const db=await idbOpen();const tx=db.transaction("kv","readonly");const req=tx.objectStore("kv").get(k);return new Promise(r=>{req.onsuccess=()=>r(req.result);req.onerror=()=>r(null);});}catch(e){return null;}
}
async function idbDel(k){
  try{const db=await idbOpen();const tx=db.transaction("kv","readwrite");tx.objectStore("kv").delete(k);}catch(e){}
}

// Save session to ALL three stores
function saveSession(user){
  const json=JSON.stringify(user);
  try{localStorage.setItem("aga-session",json);}catch(e){}
  setCookie("aga-session",json,365);
  idbSet("aga-session",json);
}
function clearSession(){
  try{localStorage.removeItem("aga-session");}catch(e){}
  delCookie("aga-session");
  idbDel("aga-session");
}
function getSessionSync(){
  try{const ls=localStorage.getItem("aga-session");if(ls) return JSON.parse(ls);}catch(e){}
  try{const ck=getCookie("aga-session");if(ck) return JSON.parse(ck);}catch(e){}
  return null;
}

// Restore session — try sync first, then async IndexedDB
try{
  const sess=getSessionSync();
  if(sess&&sess.name&&sess.role){
    S.user=sess;
    S.screen=sess.role==="boss"?"boss":"employee";
    if(sess.role==="employee") startGPS();
    requestNotifPermission();

// Async IndexedDB restore (catches iOS cases where localStorage+cookies are wiped)
(async()=>{
  if(S.user) return; // already restored
  try{
    const val=await idbGet("aga-session");
    if(val){
      const sess=JSON.parse(val);
      if(sess&&sess.name&&sess.role){
        S.user=sess;
        S.screen=sess.role==="boss"?"boss":"employee";
        if(sess.role==="employee") startGPS();
        requestNotifPermission();
        R();
      }
    }
  }catch(e){}
})();

// === PIN / BIOMETRIC ===
function isMobileDevice(){
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||('ontouchstart' in window && window.innerWidth<900);
}
async function requireBiometric(onSuccess){
  // Mobile: prompt device's native screen lock (fingerprint/face/pattern)
  if(isMobileDevice()&&window.PublicKeyCredential){
    try{
      const ok=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if(ok){
        const ch=new Uint8Array(32); crypto.getRandomValues(ch);
        const uid=new TextEncoder().encode(S.user?.name||"user");
        // Always use create() - this triggers the device's biometric/screen lock prompt
        const c=await navigator.credentials.create({publicKey:{
          challenge:ch,
          rp:{name:"AGA Tasks",id:location.hostname},
          user:{id:uid,name:S.user?.name||"user",displayName:S.user?.name||"User"},
          pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
          authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"discouraged"},
          timeout:60000,
          excludeCredentials:[]
        }});
        if(c){onSuccess();return;}
      }
    }catch(e){
      console.log("Biometric prompt:",e.name,e.message);
      // User cancelled or biometric failed → fall to PIN
    }
  }
  // Desktop or biometric unavailable → use PIN
  showPin(onSuccess);
}
function b64buf(b){const s=atob(b);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u.buffer;}
function bufb64(b){return btoa(String.fromCharCode(...new Uint8Array(b)));}

function showPin(cb){
  S.pinCb=cb; S.pinInput="";
  const emp=S.employees.find(e=>e.name===S.user?.name);
  S.pinMode=emp?.pin?"verify":"set";
  document.getElementById("pinTitle").textContent=S.pinMode==="set"?"Set Attendance PIN":"Enter Your PIN";
  document.getElementById("pinSub").textContent=S.pinMode==="set"?"Choose a 4-digit PIN for attendance":"Enter your 4-digit PIN to confirm";
  document.getElementById("pinErr").textContent="";
  updPinDots();
  document.getElementById("pinOverlay").classList.add("open");
}
function closePinOverlay(){ document.getElementById("pinOverlay").classList.remove("open"); S.pinInput=""; }
function pk(v){
  if(v==="del") S.pinInput=S.pinInput.slice(0,-1);
  else if(S.pinInput.length<4) S.pinInput+=v;
  updPinDots();
  if(S.pinInput.length===4) setTimeout(submitPin,200);
}
function updPinDots(){
  const el=document.getElementById("pinDots");
  if(el) el.innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot${i<S.pinInput.length?" filled":""}"></div>`).join("");
}
function submitPin(){
  const emp=S.employees.find(e=>e.name===S.user?.name);
  if(S.pinMode==="set"){
    if(emp){emp.pin=S.pinInput;if(window.FB)FB.updateEmp(emp.code,{pin:emp.pin});}
    closePinOverlay(); if(S.pinCb)S.pinCb();
  } else {
    if(S.pinInput===emp?.pin){closePinOverlay();if(S.pinCb)S.pinCb();}
    else{S.pinInput="";updPinDots();document.getElementById("pinErr").textContent="\u{274C} Wrong PIN. Try again.";}
  }
}

let _gpsOn=false;
function startGPS(){
  if(_gpsOn||!navigator.geolocation) return;
  _gpsOn=true;
  navigator.geolocation.getCurrentPosition(
    p=>{S.lastLat=p.coords.latitude;S.lastLng=p.coords.longitude;},
    ()=>{_gpsOn=false;},
    {enableHighAccuracy:true,timeout:20000}
  );
  navigator.geolocation.watchPosition(
    p=>{S.lastLat=p.coords.latitude;S.lastLng=p.coords.longitude;},
    ()=>{},
    {enableHighAccuracy:true,timeout:20000,maximumAge:10000}
  );
}
function refreshGPS(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res();
    navigator.geolocation.getCurrentPosition(
      p=>{S.lastLat=p.coords.latitude;S.lastLng=p.coords.longitude;res();},
      ()=>res(),
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  });
}

// Use Service Worker notifications (work even when app is minimized/background)
function swNotify(title,body){
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title,{
          body:body,
          icon:"./icon-192.png",
          badge:"./icon-192.png",
          vibrate:[200,100,200],
          tag:"aga-"+Date.now(),
          renotify:true,
          requireInteraction:false,
          data:{url:window.location.href}
        });
      }).catch(()=>{
        try{new Notification(title,{body,icon:"./icon-192.png"});}catch(e){}
      });
    } else {
      new Notification(title,{body,icon:"./icon-192.png"});
    }
  }catch(e){
    try{new Notification(title,{body,icon:"./icon-192.png"});}catch(e2){}
  }
}
function pushNotif(title,body){ swNotify(title,body); }
function addNotif(to,type,empName,body){
  const n={id:"n"+Date.now()+Math.random().toString(36).substr(2,4),to,type,empName,body,read:false,createdAt:Date.now()};
  S.notifications.push(n);
  if(window.FB) FB.saveNotif(n);
  // Push browser notification if recipient is currently logged in
  if((to==="partner"&&S.user?.role==="boss")||(to===empName&&S.user?.name===empName)){
    pushNotif("AGA Tasks",body);
  }
  // Also push for senior notifications
  if(to==="seniors"&&SENIOR_EMP.includes(S.user?.name)){
    pushNotif("AGA Tasks",body);
  }
  return n;
}

function fmtDate(d){ if(!d) return "\u{2014}"; const p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function todayStr(){ return new Date().toISOString().split("T")[0]; }
function getAttForDay(empName,date){
  return S.attendance.filter(a=>a.empName===empName&&a.date===date);

function pendingLeaves(){
  const all=S.leaves.filter(l=>l.status==="pending");
  if(S.user?.role==="boss"){
    // Partner only sees leave requests from senior employees (Heer & Bhavana)
    return all.filter(l=>SENIOR_EMP.includes(l.empName));
  }
  if(SENIOR_EMP.includes(S.user?.name)){
    // Seniors see leave requests from regular employees only (not other seniors)
    return all.filter(l=>!SENIOR_EMP.includes(l.empName));
  }
  return [];
}
function allLeavesForAdmin(){
  if(S.user?.role==="boss"){
    // Partner sees all leaves but can only action senior employee leaves
    return S.leaves;
  }
  if(SENIOR_EMP.includes(S.user?.name)){
    // Seniors see only non-senior leaves
    return S.leaves.filter(l=>!SENIOR_EMP.includes(l.empName));
  }
  return [];
}
function canApproveThisLeave(leave){
  if(S.user?.role==="boss") return SENIOR_EMP.includes(leave.empName);
  if(SENIOR_EMP.includes(S.user?.name)) return !SENIOR_EMP.includes(leave.empName);
  return false;
}
function myLeaves(name){
  return S.leaves.filter(l=>l.empName===name);
}
function canApproveLeave(){
  return S.user?.role==="boss" || SENIOR_EMP.includes(S.user?.name);
}

function submitTask(){
  const client=(document.getElementById("tClient")?.value||S.f.client).trim();
  const desc=(document.getElementById("tDesc")?.value||S.f.desc).trim();
  if(!client){toast("Client name required","err");return;}
  if(!desc){toast("Task description required","err");return;}
  if(!S.f.category){toast("Select a category","err");return;}
  if(!S.f.due){toast("Select completion date","err");return;}
  if(!S.f.assignedTo){toast("Select an employee","err");return;}
  S.f.client=client; S.f.desc=desc;
  confirm2({icon:"\u{1F4CB}",title:"Assign Task?",msg:`Assign to ${S.f.assignedTo}?`,
    detail:`<div class="lbl">Client</div>${client}<div class="lbl">Description</div>${desc.substring(0,80)}<div class="lbl">Due Date</div>${S.f.due} · ${S.f.category}`,
    yesLabel:"\u{2705} Yes, Assign",yesType:"success",
    onYes:()=>{
      const t={id:"t"+Date.now(),client:S.f.client,desc:S.f.desc,priority:S.f.priority,
        category:S.f.category,due:S.f.due,assignedTo:S.f.assignedTo,
        assignedBy:S.user?.name||"Partner",status:"pending",createdAt:Date.now()};
      S.tasks.unshift(t);
      if(window.FB) FB.saveTask(t);
      addNotif(t.assignedTo,"taskAssigned","Partner","New task assigned: "+t.client+" (Due: "+fmtDate(t.due)+")");
      toast("Task assigned to "+t.assignedTo+" \u{2705}","ok");
      go("boss");
    }
  });
}

function confirmApprove(code,name){
  const emp=S.employees.find(e=>e.code===code);
  const pass=(emp?.name||name).toLowerCase().replace(/\s+/g,""); // Default password = lowercase name no spaces
  confirm2({icon:"\u{2705}",title:"Are You Sure?",msg:`Approve ${name} as an active employee?`,
    detail:`<div class="lbl">Employee</div><strong>${name}</strong><br/>Mobile: ${emp?.mobile||"—"}<br/>Email: ${emp?.email||"—"}<div class="lbl" style="margin-top:8px;">Default Password (share with employee)</div><strong style="color:var(--accent);font-size:15px;">${pass}</strong>`,
    yesLabel:"\u{2705} Yes, Approve",yesType:"success",

function confirmDelUser(code,name){

    detail:`<span style="color:var(--red);font-size:12px;">⚠️ This cannot be undone.</span>`,
    yesLabel:"\u{1F5D1}\u{FE0F} Yes, Remove",yesType:"danger",
    onYes:()=>{
      S.employees=S.employees.filter(e=>e.code!==code);
      if(window.FB) FB.deleteEmp(code);
      toast(name+" removed");R();
    }
  });
}

function confirmResetAllData(){
  confirm2({icon:"⚠️",title:"RESET ALL DATA?",msg:"This will permanently delete ALL tasks, attendance, leaves, and notifications. Employees will be reset to defaults.",
    detail:`<span style="color:var(--red);font-size:12px;font-weight:700;">⚠️ THIS CANNOT BE UNDONE!</span>`,
    yesLabel:"🗑️ Yes, Delete Everything",yesType:"danger",
    onYes:async ()=>{
      toast("Deleting all data...","ok");
      // Delete from Firebase
      if(window.FB){
        for(const t of S.tasks) await FB.deleteTask(t.id).catch(()=>{});
        for(const a of S.attendance) await FB.deleteAtt(a.id).catch(()=>{});
        for(const l of S.leaves) await FB.deleteLeave(l.id).catch(()=>{});
        for(const n of S.notifications) await FB.deleteNotif(n.id).catch(()=>{});
        for(const m of S.chatMessages) await FB.deleteChat(m.id).catch(()=>{});
        for(const x of S.expenses) await FB.deleteExpense(x.id).catch(()=>{});
        for(const e of S.employees) await FB.deleteEmp(e.code||e.id).catch(()=>{});
      }
      // Clear local
      S.tasks=[];S.attendance=[];S.leaves=[];S.notifications=[];S.chatMessages=[];S.expenses=[];S.employees=[];

// ── ATTENDANCE REPORT (BOSS) ──
function pgAttReport(){
  const from=S.f.rptFrom; const to=S.f.rptTo;
  // Build combined in/out records per employee per day
  const allRecs=S.attendance.filter(a=>{
    if(from&&a.date<from) return false;
    if(to&&a.date>to) return false;
    return true;
  });
  // Group by empName+date
  const grouped={};
  allRecs.forEach(a=>{
    const key=a.empName+"||"+a.date;
    if(!grouped[key]) grouped[key]={empName:a.empName,date:a.date,inTime:"",outTime:"",inLoc:"",outLoc:"",inMarkedOn:"",outMarkedOn:"",inMarkedTime:"",outMarkedTime:""};
    if(a.type==="IN"){grouped[key].inTime=a.time||"";grouped[key].inLoc=a.location||"";grouped[key].inMarkedOn=a.markedOn||a.date;grouped[key].inMarkedTime=a.markedTime||a.time||"";}
    if(a.type==="OUT"){grouped[key].outTime=a.time||"";grouped[key].outLoc=a.location||"";grouped[key].outMarkedOn=a.markedOn||a.date;grouped[key].outMarkedTime=a.markedTime||a.time||"";}
  });
  const rows=Object.values(grouped).sort((a,b)=>b.date.localeCompare(a.date));

  // Check leave status for each row
  function getLeaveInfo(empName,date){
    const lv=S.leaves.find(l=>l.empName===empName&&l.status==="approved"&&l.from<=date&&l.to>=date);
    if(lv) return {onLeave:true,type:lv.leaveType,approvedBy:lv.approvedBy||"—"};
    return {onLeave:false};
  }

  return `<div style="padding:0 0 40px;">
    <div class="back-row">
      <div class="back-btn" onclick="go('boss')">←</div>
      <div><div class="page-title">Attendance Report</div></div>
    </div>
    <div class="section">
      <div style="display:flex;gap:10px;">
        <div class="f-group" style="flex:1;"><div class="f-label">From Date</div>
          <input class="f-input" type="date" onclick="this.showPicker?.()" value="${from}" onchange="S.f.rptFrom=this.value;R()"/>
        </div>
        <div class="f-group" style="flex:1;"><div class="f-label">To Date</div>
          <input class="f-input" type="date" onclick="this.showPicker?.()" value="${to}" onchange="S.f.rptTo=this.value;R()"/>
        </div>
      </div>
      <button class="btn btn-accent btn-mb" onclick="downloadAtt()" ${!from||!to?"disabled style=\"opacity:0.4;cursor:not-allowed;\"":""}>⬇️ Download Excel${!from||!to?" (select dates)":""}</button>
      <div class="card" style="overflow-x:auto;">
        <div style="display:grid;grid-template-columns:1.2fr 1fr 0.7fr 0.7fr 1.2fr;gap:4px;padding:8px 8px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);">
          <div>EMPLOYEE</div><div>DATE</div><div>IN</div><div>OUT</div><div>STATUS</div>
        </div>
        ${rows.length?rows.map(r=>{
          const li=getLeaveInfo(r.empName,r.date);
          return `<div style="display:grid;grid-template-columns:1.2fr 1fr 0.7fr 0.7fr 1.2fr;gap:4px;padding:7px 8px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);">
            <div>${(r.empName||"").split(" ")[0]}</div>
            <div>${fmtDate(r.date)}</div>
            <div style="color:var(--green);">${r.inTime||"—"}</div>
            <div style="color:var(--red);">${r.outTime||"—"}</div>
            <div>${li.onLeave?`<span style="color:var(--cyan);font-size:10px;">✈️ ${li.type}</span>`:""}</div>
          </div>`;
        }).join("")
        :`<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">No records found.</div>`}
        <div style="text-align:center;padding:8px;color:var(--text3);font-size:11px;">${rows.length} record(s)</div>
      </div>
    </div>
  </div>`;
}
function downloadAtt(){
  const from=S.f.rptFrom; const to=S.f.rptTo;
  if(!from||!to){toast("Please select both From and To dates","err");return;}
  const allRecs=S.attendance.filter(a=>{
    if(from&&a.date<from) return false;
    if(to&&a.date>to) return false;
    return true;
  });
  const grouped={};
  allRecs.forEach(a=>{
    const key=a.empName+"||"+a.date;
    if(!grouped[key]) grouped[key]={empName:a.empName,date:a.date,inTime:"",outTime:"",inLoc:"",outLoc:"",inMarkedOn:"",outMarkedOn:"",inMarkedTime:"",outMarkedTime:""};
    if(a.type==="IN"){grouped[key].inTime=a.time||"";grouped[key].inLoc=a.location||"";grouped[key].inMarkedOn=a.markedOn||a.date;grouped[key].inMarkedTime=a.markedTime||a.time||"";}
    if(a.type==="OUT"){grouped[key].outTime=a.time||"";grouped[key].outLoc=a.location||"";grouped[key].outMarkedOn=a.markedOn||a.date;grouped[key].outMarkedTime=a.markedTime||a.time||"";}
  });
  const rows=Object.values(grouped).sort((a,b)=>b.date.localeCompare(a.date));
  if(!window.XLSX){toast("Excel library not loaded","err");return;}
  const xlRows=[["Employee","Date (DD/MM/YYYY)","IN Time","IN Marked At","IN Location","OUT Time","OUT Marked At","OUT Location","IN Marked On","OUT Marked On","Leave Status","Leave Approved By"]];
  rows.forEach(r=>{
    const li=S.leaves.find(l=>l.empName===r.empName&&l.status==="approved"&&l.from<=r.date&&l.to>=r.date);
    xlRows.push([
      r.empName,
      fmtDate(r.date),
      r.inTime||"—",
      r.inMarkedTime||"—",
      r.inLoc||"—",
      r.outTime||"—",
      r.outMarkedTime||"—",
      r.outLoc||"—",
      r.inMarkedOn?fmtDate(r.inMarkedOn):"—",
      r.outMarkedOn?fmtDate(r.outMarkedOn):"—",
      li?li.leaveType:"—",
      li?(li.approvedBy||"—"):"—"
    ]);
  });
  const ws=XLSX.utils.aoa_to_sheet(xlRows);
  ws["!cols"]=[{wch:20},{wch:14},{wch:10},{wch:10},{wch:22},{wch:10},{wch:10},{wch:22},{wch:14},{wch:14},{wch:14},{wch:16}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Attendance");
  XLSX.writeFile(wb,"AGA_Attendance_"+(from||"all")+"_to_"+(to||"all")+".xlsx");
  toast("Excel downloaded \u{2705}","ok");
}

function doChangePass(){
  const old=(document.getElementById("cpOld")?.value||"").trim();
  const nw=(document.getElementById("cpNew")?.value||"").trim();
  const conf=(document.getElementById("cpConf")?.value||"").trim();
  if(S.user?.role==="boss"){
    if(old!==S.partnerPass){toast("Current password incorrect","err");return;}
    if(nw.length<6){toast("Min 6 characters","err");return;}
    if(nw!==conf){toast("Passwords do not match","err");return;}
    S.partnerPass=nw;
    if(window.FB) FB.saveSetting("config",{partnerPass:nw});
    toast("Password updated \u{2705}","ok"); go("boss");
  } else {
    const emp=S.employees.find(e=>e.name===S.user?.name);
    if(!emp||old!==emp.password){toast("Current password incorrect","err");return;}
    if(nw.length<6){toast("Min 6 characters","err");return;}
    if(nw!==conf){toast("Passwords do not match","err");return;}
    emp.password=nw; if(window.FB)FB.updateEmp(emp.code,{password:nw});
    toast("Password updated \u{2705}","ok"); go("employee");
  }
}

function clearMyNotifs(){
  const myName=S.user?.name||"";
  const isBoss=S.user?.role==="boss";
  const isSenior=SENIOR_EMP.includes(myName);
  const toDelete=S.notifications.filter(n=>{
    if(isBoss) return n.to==="partner";
    if(isSenior) return n.to===myName||n.to==="seniors";
    return n.to===myName;
  });
  confirm2({icon:"🗑️",title:"Clear Notifications?",msg:`Delete all ${toDelete.length} notifications?`,
    yesLabel:"🗑️ Yes, Clear All",yesType:"danger",
    onYes:async ()=>{
      for(const n of toDelete){
        S.notifications=S.notifications.filter(x=>x.id!==n.id);
        if(window.FB) await FB.deleteNotif(n.id).catch(()=>{});
      }
      toast("Notifications cleared","ok");R();
    }
  });
}

function handleExpPhoto(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>5*1024*1024){toast("Photo must be under 5MB","err");return;}
  const reader=new FileReader();
  reader.onload=function(e){
    S.f.expPhoto=e.target.result;
    S.f.expPhotoName=file.name;
    R();
  };
  reader.readAsDataURL(file);
}

function submitExpense(){
  const{expDate,expAmount,expCategory,expDesc,expPhoto}=S.f;
  if(!expDate){toast("Select date","err");return;}
  if(!expAmount||Number(expAmount)<=0){toast("Enter valid amount","err");return;}
  if(!expCategory){toast("Select category","err");return;}
  if(!expDesc.trim()){toast("Enter description","err");return;}
  const name=S.user?.name||"";
  const exp={
    id:"exp"+Date.now()+Math.random().toString(36).substr(2,4),
    empName:name,
    date:expDate,
    amount:Number(expAmount),
    category:expCategory,
    desc:expDesc.trim(),
    photo:expPhoto||null,
    status:"pending",
    approvedBy:null, approvedAt:null, rejectRemark:null,
    createdAt:Date.now()
  };
  S.expenses.unshift(exp);
  if(window.FB) FB.saveExpense(exp);
  addNotif("partner","expense",name,name+" submitted expense ₹"+Number(expAmount).toLocaleString("en-IN")+" ("+expCategory+")");
  S.f.expDate=new Date().toISOString().split("T")[0];
  S.f.expAmount="";S.f.expCategory="";S.f.expDesc="";S.f.expPhoto=null;S.f.expPhotoName="";
  toast("Expense submitted ✅","ok"); go("myExpenses");
}

function deleteExpense(id){
  confirm2({icon:"🗑️",title:"Delete Expense?",msg:"Delete this expense claim?",
    yesLabel:"🗑️ Delete",yesType:"danger",
    onYes:()=>{
      S.expenses=S.expenses.filter(e=>e.id!==id);

function viewReceiptPhoto(id){
  const exp=S.expenses.find(e=>e.id===id);

  const w=window.open();
  w.document.write(`<html><head><title>Receipt</title><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;}img{max-width:100%;max-height:100vh;}</style></head><body><img src="${exp.photo}"/></body></html>`);
}

function downloadExpenseExcel(){
  const from=S.f.expRptFrom; const to=S.f.expRptTo;
  if(!from||!to){toast("Select both dates","err");return;}
  const filtered=S.expenses.filter(e=>e.date>=from&&e.date<=to);
  if(!filtered.length){toast("No expenses in this range","err");return;}

  // Sheet 1: Summary
  const empNames=[...new Set(filtered.map(e=>e.empName))].sort();
  const summaryRows=[["Employee","Total (₹)","Approved (₹)","Pending (₹)","Rejected (₹)"]];
  let gTotal=0,gApp=0,gPend=0,gRej=0;
  empNames.forEach(name=>{
    const empExp=filtered.filter(e=>e.empName===name);
    const total=empExp.reduce((s,e)=>s+Number(e.amount||0),0);
    const app=empExp.filter(e=>e.status==="approved").reduce((s,e)=>s+Number(e.amount||0),0);
    const pend=empExp.filter(e=>e.status==="pending").reduce((s,e)=>s+Number(e.amount||0),0);
    const rej=empExp.filter(e=>e.status==="rejected").reduce((s,e)=>s+Number(e.amount||0),0);
    summaryRows.push([name,total,app,pend,rej]);
    gTotal+=total; gApp+=app; gPend+=pend; gRej+=rej;
  });
  summaryRows.push(["TOTAL",gTotal,gApp,gPend,gRej]);

  // Sheet 2: Line Items
  const lineRows=[["Date","Employee","Category","Description","Amount (₹)","Status","Approved By","Remark"]];
  filtered.sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    lineRows.push([e.date,e.empName,e.category,e.desc,Number(e.amount),
      e.status.charAt(0).toUpperCase()+e.status.slice(1),
      e.approvedBy||"—",e.rejectRemark||"—"]);
  });

  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet(summaryRows);
  ws1["!cols"]=[{wch:20},{wch:14},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,"Summary");
  const ws2=XLSX.utils.aoa_to_sheet(lineRows);
  ws2["!cols"]=[{wch:12},{wch:18},{wch:15},{wch:35},{wch:12},{wch:10},{wch:14},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,"Line Items");
  XLSX.writeFile(wb,"AGA_Expenses_"+from+"_to_"+to+".xlsx");
  toast("Report downloaded ✅","ok");
}

function getChatChannel(a,b){
  return [a,b].sort().join("||");
}

function pgChatList(){
  const backScreen=S.user?.role==="boss"?"boss":"employee";
  const myName=S.user?.name||(S.user?.role==="boss"?"Chintan":"");
  const allMembers=["Chintan",...S.employees.filter(e=>e.approved!==false).map(e=>e.name)];
  const otherMembers=allMembers.filter(n=>n!==myName);

  // Team chat info
  const teamMsgs=S.chatMessages.filter(m=>m.channel==="team");
  const lastTeam=teamMsgs.length?teamMsgs[teamMsgs.length-1]:null;
  const teamUnread=teamMsgs.filter(m=>m.sender!==myName&&!(m.readBy||[]).includes(myName)).length;

  // Individual chats
  const individuals=otherMembers.map(name=>{
    const ch=getChatChannel(myName,name);
    const msgs=S.chatMessages.filter(m=>m.channel===ch);
    const last=msgs.length?msgs[msgs.length-1]:null;
    const unread=msgs.filter(m=>m.sender!==myName&&!(m.readBy||[]).includes(myName)).length;
    return {name,last,unread,ch};
  }).sort((a,b)=>{
    const at=a.last?a.last.createdAt:0;
    const bt=b.last?b.last.createdAt:0;
    return bt-at;
  });

  function fmtChatTime(ts){
    if(!ts) return "";
    const d=new Date(ts);
    const now=new Date();
    const diff=now-d;
    if(diff<86400000) return d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    if(diff<172800000) return "Yesterday";
    return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"});
  }

  return `<div style="padding:0 0 40px;">
    <div class="back-row">

      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:10px;color:var(--text3);">${fmtChatTime(lastTeam?.createdAt)}</div>
        ${teamUnread?`<div style="background:var(--accent);color:#fff;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:4px;margin-left:auto;">${teamUnread}</div>`:""}
      </div>
    </div>

    <div style="padding:14px 20px 6px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;">INDIVIDUAL</div>
    ${individuals.map(c=>`
    <div onclick="S.chatWith='${c.name}';go('chatConvo')" style="display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);">

let emojiCatIdx=0;

function renderEmojiPicker(){
  const tabs=document.getElementById("emojiTabs");
  const grid=document.getElementById("emojiGrid");
  if(!tabs||!grid) return;
  tabs.innerHTML=EMOJI_CATS.map((c,i)=>`<div onclick="emojiCatIdx=${i};renderEmojiPicker()" style="padding:8px 10px;font-size:18px;cursor:pointer;flex-shrink:0;border-bottom:2px solid ${i===emojiCatIdx?"var(--accent)":"transparent"};opacity:${i===emojiCatIdx?1:0.5};">${c.icon}</div>`).join("");
  const emojis=EMOJI_CATS[emojiCatIdx].e;
  grid.innerHTML=emojis.map(e=>`<span onclick="insertEmoji('${e}')" style="font-size:24px;cursor:pointer;padding:4px 5px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;" onmouseover="this.style.background='var(--card)'" onmouseout="this.style.background='transparent'">${e}</span>`).join("");
  grid.scrollTop=0;
}

function toggleEmojiPicker(){
  const el=document.getElementById("emojiPicker");
  if(!el) return;
  if(el.style.display==="none"){
    el.style.display="block";
    renderEmojiPicker();
  } else {
    el.style.display="none";
  }
}
function closeEmojiPicker(){
  const el=document.getElementById("emojiPicker");
  if(el) el.style.display="none";
}
function insertEmoji(e){
  const input=document.getElementById("chatInput");
  if(input){input.value+=e;}
}

function sendChat(){
  closeEmojiPicker();
  const input=document.getElementById("chatInput");
  const text=(input?.value||"").trim();
  if(!text) return;
  const myName=S.user?.name||(S.user?.role==="boss"?"Chintan":"");
  const isTeam=S.chatWith==="team";
  const channel=isTeam?"team":getChatChannel(myName,S.chatWith);
  const msg={
    id:"chat"+Date.now()+Math.random().toString(36).substr(2,4),
    channel,
    sender:myName,
    to:isTeam?"team":S.chatWith,
    text,
    readBy:[myName],
    createdAt:Date.now()
  };
  S.chatMessages.push(msg);
  if(window.FB) FB.saveChat(msg);
  input.value="";
  R();
}

function pgEmployee(){
  const name=S.user?.name||"";
  const isSenior=SENIOR_EMP.includes(name);
  const today=todayStr();

  // Tasks directly assigned to me (not reassigned away)
  const directTasks=S.tasks.filter(t=>t.assignedTo===name&&!t.reassignedTo);
  // Tasks I reassigned to someone
  const reassignedByMe=S.tasks.filter(t=>t.assignedTo===name&&t.reassignedTo);
  // Tasks reassigned TO me by a senior
  const reassignedToMe=S.tasks.filter(t=>t.reassignedTo===name);

  // PENDING buckets
  const pendDirect=directTasks.filter(t=>t.status==="pending");
  const pendReassignedToMe=reassignedToMe.filter(t=>!t.reassigneeCompleted);
  const pendNeedsMyApproval=reassignedByMe.filter(t=>t.status==="pending"&&t.reassigneeCompleted);
  const waitingOnAssignee=reassignedByMe.filter(t=>t.status==="pending"&&!t.reassigneeCompleted);

  // DONE buckets
  const doneDirect=directTasks.filter(t=>t.status==="completed");
  const doneReassignedToMe=reassignedToMe.filter(t=>t.reassigneeCompleted);
  const doneReassignedByMe=reassignedByMe.filter(t=>t.status==="completed");

  const totalPend=pendDirect.length+pendReassignedToMe.length+pendNeedsMyApproval.length+waitingOnAssignee.length;
  const totalDone=doneDirect.length+doneReassignedToMe.length+doneReassignedByMe.length;

  // Tasks due today
  const allMyPending=[...pendDirect,...pendReassignedToMe,...pendNeedsMyApproval,...waitingOnAssignee].sort((a,b)=>(a.due||"9999").localeCompare(b.due||"9999"));
  const dueToday=allMyPending.filter(t=>t.due===today);

  // Check if on approved leave today
  const onLeaveToday=S.leaves.find(l=>l.empName===name&&l.status==="approved"&&l.from<=today&&l.to>=today);

  const myPendLeaves=myLeaves(name).filter(l=>l.status==="pending").length;
  const canApprove=canApproveLeave();
  const pendLeaveCount=canApprove?pendingLeaves().length:0;

    const byPartner=!t.assignedBy||t.assignedBy==="Partner"||t.assignedBy==="Chintan";
    const bySenior=SENIOR_EMP.includes(t.assignedBy||"");
    const cls=type==="reassignedToMe"?"from-senior":byPartner?"from-partner":bySenior?"from-senior":"";

    let badge="";
    if(type==="reassignedToMe") badge=`<span class="badge badge-senior">↪️ From ${t.assignedTo}</span>`;
    else if(byPartner) badge=`<span class="badge badge-partner">🔵 From Partner</span>`;
    else if(bySenior) badge=`<span class="badge badge-senior">🟡 From ${t.assignedBy}</span>`;

    let actionHtml="";
    if(type==="direct"){
      actionHtml=`<div class="task-actions">
        <button class="btn btn-green" style="flex:2;padding:10px;" onclick="empComplete('${t.id}')">✅ Mark Complete</button>
        ${isSenior?`<button class="btn btn-yellow" style="flex:1;padding:10px;" onclick="openReassign('${t.id}')">↪️</button>`:""}
      </div>`;
    } else if(type==="reassignedToMe"){
      actionHtml=`<div class="task-actions">
        <button class="btn btn-green" style="width:100%;padding:10px;" onclick="empCompleteAsReassignee('${t.id}')">✅ Mark Complete</button>
      </div>`;
    } else if(type==="needsMyApproval"){
      actionHtml=`<div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--green);">✅ Completed by ${t.reassignedTo}</div>
      <div class="task-actions">
        <button class="btn btn-green" style="width:100%;padding:10px;" onclick="empComplete('${t.id}')">✅ Mark Complete</button>
      </div>`;
    } else if(type==="waiting"){

function empComplete(id){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  confirm2({icon:"\u{2705}",title:"Mark Complete?",msg:`Mark "${t.client}" as done?`,
    yesLabel:"\u{2705} Yes",yesType:"success",
    onYes:()=>{
      t.status="completed";t.completedAt=new Date().toISOString();
      if(window.FB)FB.updateTask(id,{status:"completed",completedAt:t.completedAt});
      addNotif("partner","taskDone",S.user?.name,(S.user?.name||"")+" completed: "+t.client);
      toast("Task completed \u{2705}","ok");R();
    }});
}

function empCompleteAsReassignee(id){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  confirm2({icon:"\u{2705}",title:"Mark Complete?",msg:`Mark "${t.client}" as done? This will notify ${t.assignedTo}.`,
    yesLabel:"\u{2705} Yes",yesType:"success",
    onYes:()=>{
      t.reassigneeCompleted=true;
      if(window.FB)FB.updateTask(id,{reassigneeCompleted:true});
      addNotif("partner","taskDone",S.user?.name,(S.user?.name||"")+" completed (reassigned): "+t.client);
      addNotif(t.assignedTo,"taskDone",S.user?.name,(S.user?.name||"")+" completed your reassigned task: "+t.client);
      toast("Task completed! "+t.assignedTo+" will be notified \u{2705}","ok");R();
    }});
}

function openReassign(id){
  S.reassignId=id; S.f.assignedTo="";
  const approved=S.employees.filter(e=>e.approved!==false&&!SENIOR_EMP.includes(e.name));
  const opts=approved.map(e=>`<option value="${e.name}">${e.name}</option>`).join("");
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  confirm2({icon:"\u{21AA}\u{FE0F}",title:"Reassign Task",msg:`Reassign "${t.client}" to:`,
    detail:`<select class="f-input" id="reassignSel" style="margin-top:8px;"><option value="">— Select Employee —</option>${opts}</select>`,
    yesLabel:"\u{21AA}\u{FE0F} Reassign",yesType:"primary",
    onYes:()=>{
      const to=document.getElementById("reassignSel")?.value;
      if(!to){toast("Select an employee","err");return;}
      t.reassignedTo=to;
      t.reassignedBy=S.user?.name;
      t.reassigneeCompleted=false;
      if(window.FB) FB.updateTask(t.id,{reassignedTo:to,reassignedBy:t.reassignedBy,reassigneeCompleted:false});
      addNotif(to,"taskAssigned",S.user?.name,"Task reassigned to you: "+t.client+" (Due: "+fmtDate(t.due)+")");
      toast("Reassigned to "+to+" \u{2705}","ok"); R();
    }
  });
}

function buildAttCal(empName){
  const y=S.f.attCalY; const m=S.f.attCalM;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=todayStr();
  const dayNames=DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join("");
  let cells=Array(first).fill(`<div class="cal-day empty"></div>`);
  for(let d=1;d<=days;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const recs=getAttForDay(empName,dateStr);
    const hasIn=recs.some(a=>a.type==="IN");
    const hasOut=recs.some(a=>a.type==="OUT");
    const sel=dateStr===S.f.attDate;
    const isToday=dateStr===today;
    const isFuture=dateStr>today;
    let cls="cal-day";
    if(isFuture) cls+=" empty";
    else if(sel) cls+=" selected";
    else if(hasIn&&hasOut) cls+=" marked-both";
    else if(hasIn) cls+=" marked-in";
    else if(hasOut) cls+=" marked-out";
    else if(isToday) cls+=" today";
    if(isFuture){
      cells.push(`<div class="${cls}" style="opacity:0.3;cursor:not-allowed;">${d}</div>`);
    } else {
      cells.push(`<div class="${cls}" onclick="S.f.attDate='${dateStr}';R()">${d}</div>`);
    }
  }
  return `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="if(S.f.attCalM===0){S.f.attCalM=11;S.f.attCalY--;}else S.f.attCalM--;R()">‹</button>
    <div class="cal-month">${MONTHS[m]} ${y}</div>
    <button class="cal-nav-btn" onclick="if(S.f.attCalM===11){S.f.attCalM=0;S.f.attCalY++;}else S.f.attCalM++;R()">›</button>
  </div>
  <div class="cal-grid">${dayNames}${cells.join("")}</div>`;
}


function doMarkAtt(type){
  const name=S.user?.name; const date=S.f.attDate||todayStr();
  const today=todayStr();
  if(date>today){toast("Cannot mark attendance for future dates","err");return;}
  const recs=getAttForDay(name,date);
  if(type==="IN"&&recs.some(a=>a.type==="IN")){toast("Already marked IN for this date","err");return;}
  if(type==="OUT"&&recs.some(a=>a.type==="OUT")){toast("Already marked OUT for this date","err");return;}
  if(type==="OUT"&&!recs.some(a=>a.type==="IN")){toast("Please mark IN first","err");return;}
  requireBiometric(async ()=>{
    await refreshGPS();
    const now=new Date();
    const timeStr=now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});
    const markedOn=todayStr();
    const rec={id:"att"+Date.now(),empName:name,type,date,
      time:timeStr,markedTime:timeStr,markedOn,
      lat:S.lastLat,lng:S.lastLng,
      location:S.lastLat?S.lastLat.toFixed(4)+", "+S.lastLng.toFixed(4):"unknown",
      createdAt:Date.now()};
    if(S.lastLat){
      fetch("https://nominatim.openstreetmap.org/reverse?lat="+S.lastLat+"&lon="+S.lastLng+"&format=json")
        .then(r=>r.json()).then(d=>{
          const a=d.address;
          rec.location=[a.road||a.pedestrian,a.suburb||a.neighbourhood||a.village||a.town||a.city].filter(Boolean).slice(0,2).join(", ")||rec.location;
          if(window.FB) FB.saveAtt(rec);
        }).catch(()=>{if(window.FB) FB.saveAtt(rec);});
    } else {
      if(window.FB) FB.saveAtt(rec);
    }
    S.attendance.push(rec);
    addNotif("partner","attendance",name,name+" marked "+type+" at "+timeStr+(date!==markedOn?" (for "+fmtDate(date)+")":""));
    toast(`${type} marked at ${timeStr} ✅`,"ok");
    R();
  });
}

      <div><div class="page-title">✈️ Apply Leave</div><div class="page-sub">Select leave duration</div></div>
    </div>
    <div class="section" style="margin-top:10px;">
      <div onclick="S.f.leaveMode='half';go('leaveForm')" style="background:var(--card);border:2px solid ${S.f.leaveMode==='half'?'var(--accent)':'var(--border)'};border-radius:14px;padding:20px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:16px;">
        <div style="width:52px;height:52px;border-radius:12px;background:rgba(234,179,8,0.12);display:flex;align-items:center;justify-content:center;font-size:26px;">🌗</div>
        <div>
          <div style="font-size:16px;font-weight:800;color:var(--text);">Half Day</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;">Select one date and AM or PM session</div>
        </div>
      </div>
      <div onclick="S.f.leaveMode='full';go('leaveForm')" style="background:var(--card);border:2px solid ${S.f.leaveMode==='full'?'var(--accent)':'var(--border)'};border-radius:14px;padding:20px;cursor:pointer;display:flex;align-items:center;gap:16px;">
        <div style="width:52px;height:52px;border-radius:12px;background:rgba(6,182,212,0.12);display:flex;align-items:center;justify-content:center;font-size:26px;">📅</div>
        <div>
          <div style="font-size:16px;font-weight:800;color:var(--text);">Full Day(s)</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;">Select from and to date for one or more days</div>
        </div>
      </div>
    </div>
  </div>`;
}

function pgLeaveForm(){
  const isHalf=S.f.leaveMode==="half";
  const leaveTypes=["Casual Leave","Sick Leave","Earned Leave"];
  return `<div style="padding:0 0 40px;">
    <div class="back-row">
      <div class="back-btn" onclick="go('applyLeave')">←</div>
      <div><div class="page-title">${isHalf?"🌗 Half Day Leave":"📅 Full Day Leave"}</div></div>
    </div>
    <div class="section">
      <div class="f-group"><div class="f-label">Leave Type</div>
        <select class="f-input" onchange="S.f.leaveType=this.value">
          ${leaveTypes.map(t=>`<option value="${t}" ${S.f.leaveType===t?"selected":""}>${t}</option>`).join("")}
        </select>
      </div>
      ${isHalf?`
      <div class="f-group"><div class="f-label">Date</div>
        <input class="f-input" type="date" onclick="this.showPicker?.()" value="${S.f.leaveFrom}" onchange="S.f.leaveFrom=this.value;S.f.leaveTo=this.value;"/>
      </div>
      <div class="f-group"><div class="f-label">Session</div>
        <div style="display:flex;gap:10px;">
          <div onclick="S.f.leaveHalf='AM';R()" style="flex:1;padding:14px;text-align:center;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;background:${S.f.leaveHalf==='AM'?'var(--accent)':'var(--card)'};color:${S.f.leaveHalf==='AM'?'#fff':'var(--text2)'};border:1px solid ${S.f.leaveHalf==='AM'?'var(--accent)':'var(--border)'};">
            ☀️ First Half<div style="font-size:10px;font-weight:400;margin-top:2px;opacity:0.7;">Morning</div>
          </div>
          <div onclick="S.f.leaveHalf='PM';R()" style="flex:1;padding:14px;text-align:center;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;background:${S.f.leaveHalf==='PM'?'var(--accent)':'var(--card)'};color:${S.f.leaveHalf==='PM'?'#fff':'var(--text2)'};border:1px solid ${S.f.leaveHalf==='PM'?'var(--accent)':'var(--border)'};">
            🌙 Second Half<div style="font-size:10px;font-weight:400;margin-top:2px;opacity:0.7;">Afternoon</div>
          </div>
        </div>
      </div>`:`
      <div class="f-group"><div class="f-label">From Date</div>
        <input class="f-input" type="date" onclick="this.showPicker?.()" value="${S.f.leaveFrom}" onchange="S.f.leaveFrom=this.value"/>
      </div>
      <div class="f-group"><div class="f-label">To Date</div>
        <input class="f-input" type="date" onclick="this.showPicker?.()" value="${S.f.leaveTo}" onchange="S.f.leaveTo=this.value"/>
      </div>`}
      <div class="f-group"><div class="f-label">Reason (Optional)</div>
        <textarea class="f-input" placeholder="Reason for leave..." oninput="S.f.leaveReason=this.value">${S.f.leaveReason}</textarea>
      </div>
      <button class="btn btn-accent" onclick="submitLeave()">✈️ Apply Leave</button>
    </div>
  </div>`;
}

function submitLeave(){
  const isHalf=S.f.leaveMode==="half";
  const from=S.f.leaveFrom; const to=isHalf?from:S.f.leaveTo;
  if(!from){toast("Select "+(isHalf?"date":"from date"),"err");return;}
  if(!isHalf&&!to){toast("Select to date","err");return;}
  if(!isHalf&&from>to){toast("From date must be before to date","err");return;}
  const halfLabel=isHalf?(" ("+S.f.leaveHalf+" - "+(S.f.leaveHalf==="AM"?"First Half":"Second Half")+")"):"";
  const durLabel=isHalf?("Half Day"+halfLabel+" on "+fmtDate(from)):(fmtDate(from)+" → "+fmtDate(to));
  confirm2({icon:"✈️",title:"Are You Sure?",msg:`Apply ${S.f.leaveType}?`,
    detail:`<div class="lbl">Type</div>${S.f.leaveType}<div class="lbl">Duration</div>${durLabel}<div class="lbl">Reason</div>${S.f.leaveReason||"Not specified"}`,
    yesLabel:"\u{2705} Yes, Apply",yesType:"success",
    onYes:()=>{
      const l={id:"lv"+Date.now(),empName:S.user?.name,leaveType:S.f.leaveType,
        from,to:to||from,reason:S.f.leaveReason,status:"pending",
        isHalf:isHalf,halfSession:isHalf?S.f.leaveHalf:null,
        createdAt:Date.now()};
      S.leaves.push(l);
      if(window.FB) FB.saveLeave(l);
      const notifMsg=(S.user?.name||"")+" applied for "+S.f.leaveType+(isHalf?" (Half Day - "+(S.f.leaveHalf==="AM"?"1st Half":"2nd Half")+")":" (Full Day)")+" "+durLabel;
      if(SENIOR_EMP.includes(S.user?.name)){
        addNotif("partner","leaveRequest",S.user?.name,notifMsg);
      } else {
        addNotif("seniors","leaveRequest",S.user?.name,notifMsg);
      }
      S.f.leaveFrom=""; S.f.leaveTo=""; S.f.leaveReason=""; S.f.leaveMode=""; S.f.leaveHalf="AM";
      toast("Leave applied! Awaiting approval.","ok");
      go("employee");
    }
  });
}

// ── MY LEAVES ──
function pgMyLeaves(){
  const name=S.user?.name;
  const leaves=myLeaves(name);
  return `<div style="padding:0 0 40px;">
    <div class="back-row">
      <div class="back-btn" onclick="go('employee')">←</div>
      <div><div class="page-title">My Leaves</div></div>
    </div>
    <div class="section">
      ${leaves.length?leaves.map(l=>`
        <div class="leave-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span class="badge badge-leave">${l.leaveType}</span>
            <div class="leave-status-${l.status}">${l.status==="pending"?"\u{23F3} Pending":l.status==="approved"?"\u{2705} Approved":"\u{2715} Rejected"}</div>
          </div>
          <div style="font-size:13px;font-weight:600;margin-bottom:4px;">📅 ${fmtDate(l.from)} → ${fmtDate(l.to)}</div>
          <div style="font-size:12px;color:var(--text3);">${l.reason||"No reason provided"}</div>
          ${l.status==="approved"?`<div style="font-size:11px;color:var(--green);margin-top:6px;">Approved by ${l.approvedBy||"—"}</div>`:""}
        </div>`).join("")
        :`<div style="text-align:center;padding:30px;color:var(--text3);">No leave applications</div>`}
    </div>
  </div>`;
}

// Senior employee leave approval
function buildSeniorLeaveApproval(){
  const pLeaves=pendingLeaves();
  if(!pLeaves.length) return "";
  return `<div class="section">
    <div class="section-title" style="color:var(--cyan);">✈️ Pending Leaves (${pLeaves.length})</div>
    ${pLeaves.map(l=>`
      <div class="leave-card">
        <div style="font-size:14px;font-weight:700;margin-bottom:6px;">${l.empName}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">📅 ${fmtDate(l.from)} → ${fmtDate(l.to)} · ${l.leaveType}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-green btn-sm" onclick="confirmApproveLeave('${l.id}','${l.empName}')">✅ Approve</button>
          <button class="btn btn-red btn-sm" onclick="confirmRejectLeave('${l.id}','${l.empName}')">✕ Reject</button>
        </div>
      </div>`).join("")}
  </div>`;
}
