<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AGA Tasks - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --card: #151923; --border: #1e2533;
            --accent-blue: #5c7cfa; --accent-green: #10b981;
            --high: #ff4d4d; --text-main: #ffffff; --text-dim: #717b91;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text-main); min-height: 100vh; }
        .phone-frame { width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; }

        /* NAVIGATION CONTROL */
        .screen { display: none; }
        .active-screen { display: block !important; }

        /* BRANDING */
        .logo-box { width: 80px; height: 80px; background: #000; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .brand-name { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .app-title { font-size: 14px; color: var(--text-dim); text-align: center; margin-bottom: 30px; }
        
        /* UI ELEMENTS */
        .f-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: white; margin-bottom: 15px; outline: none; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 12px; display: block; text-align: center; }
        
        /* DASHBOARD */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .action-btn { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; cursor: pointer; border-bottom: 2px solid var(--accent-blue); text-align: center; }
        .attendance-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .export-link { color: var(--accent-blue); font-size: 11px; font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; padding: 20px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-top: 40px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
    </style>
</head>
