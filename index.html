<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AGA Tasks - Partner Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --card: #151923; --border: #1e2533;
            --accent-blue: #5c7cfa; --accent-green: #10b981;
            --high: #ff4d4d; --medium: #f39c12; --pending: #e67e22;
            --text-main: #ffffff; --text-dim: #717b91;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text-main); min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 10px; }
        .greeting h2 { font-family: 'Syne', sans-serif; font-size: 22px; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; }

        /* QUICK ACTIONS */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .action-btn { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; border-bottom: 2px solid transparent; }
        .action-btn label { font-size: 11px; font-weight: 700; color: #cbd5e1; cursor: pointer; }
        .btn-team { border-color: #3b82f6; }
        .btn-anal { border-color: #8b5cf6; }

        /* EMPLOYEE ATTENDANCE CARD */
        .attendance-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .att-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .att-title { font-size: 13px; font-weight: 700; color: var(--accent-green); display: flex; align-items: center; gap: 6px; }
        .export-link { font-size: 11px; color: var(--accent-blue); font-weight: bold; cursor: pointer; text-decoration: underline; }
        .att-status-box { background: rgba(16, 185, 129, 0.05); padding: 10px; border-radius: 10px; font-size: 12px; text-align: center; color: var(--text-dim); border: 1px dashed rgba(16,185,129,0.2); }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 30px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal h3 { font-family: 'Syne'; margin-bottom: 15px; font-size: 18px; color: var(--accent-blue); }
        label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-top: 10px; margin-bottom: 5px; }
