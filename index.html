<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#6366f1"/>
<title>AGA Tasks - Partner Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080a0f;--surface:#0f1219;--card:#141923;--border:#1a2035;
  --accent:#6366f1;--cyan:#22d3ee;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --text:#dde4f0;--muted:#4a5680;--soft:#8892aa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);padding-top:60px;}

/* TOPBAR */
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:100;}
.brand{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;color:var(--accent);}

/* PARTNER DASHBOARD STYLES */
.admin-section {
    margin: 15px;
    padding: 15px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
}
.admin-title {
    font-family: "Syne", sans-serif;
    font-size: 14px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 12px;
}
.notif-card {
    font-size: 11px;
    padding: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
}
.pending-user {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}
.btn-approve {
    background: var(--green);
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
}
.partner-badge {
    background: var(--accent);
    color: white;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 5px;
}
#app { padding-bottom: 80px; }
.login-box { max-width: 350px; margin: 50px auto; padding: 20px; text-align: center; }
.f-inp { width: 100%; padding: 12px; margin: 8px 0; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 8px; }
.btn-main { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">AGA <span>Tasks</span> <small id="roleTag"></small></div>
  <button id="logoutBtn" style="display:none; background:none; border:none; color:var(--red); font-size:12px;">Logout</button>
</div>

<div id="app">
    <div id="loginScreen" class="login-box">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Partner Login</h2>
        <input type="email" id="emailInp" class="f-inp" placeholder="Email Address">
        <input type="password" id="passInp" class="f-inp" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Sign In</button>
        <p style="font-size: 11px; color: var(--muted); margin-top: 15px;">New employees will be locked until Partner approves.</p>
    </div>

    <div id="partnerDashboard" style="display:none;">
        <div class="admin-section">
            <div class="admin-title">Pending Approvals</div>
            <div id="approvalList">Checking for new staff...</div>
        </div>
        <div class="admin-section">
            <div class="admin-title">Live Activity Feed</div>
            <div id="notifList">No recent activity.</div>
        </div>
        <div class="admin-section">
            <div class="admin-title">Manage Team</div>
            <div id="staffList"></div>
        </div>
    </div>

    <div id="employeeView" style="display:none; text-align:center; padding: 40px;">
        <h2 id="welcomeMsg"></h2>
        <div id="lockMessage" style="color:var(--yellow); margin-top: 20px;">
            Your account is pending approval from Chintan.
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
    apiKey: "AIzaSyC4oF4oNzPtQNPaKQaOnnJeIFKXLNMOA9g",
    authDomain: "ag-task-assigner.firebaseapp.com",
    projectId: "ag-task-assigner",
    storageBucket: "ag-task-assigner.appspot.com",
    messagingSenderId: "694340088537",
    appId: "1:694340088537:web:1f14fb2bf3b62d5c7ae7bc"
};

const app = initializeApp(cfg);
const db = getFirestore(app);

// LOGIN LOGIC
window.handleLogin = async () => {
    const email = document.getElementById('emailInp').value;
    const pass = document.getElementById('passInp').value;

    if(email === "chintan@acharyagehlot.com") {
        showDashboard('partner');
    } else {
        // Simple mock login for demo - in your real app, this connects to Auth
        checkEmployee(email);
    }
};

function showDashboard(role) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'block';
    
    if(role === 'partner') {
        document.getElementById('partnerDashboard').style.display = 'block';
        document.getElementById('roleTag').innerHTML = '<span class="partner-badge">PARTNER</span>';
        loadPartnerData();
    } else {
        document.getElementById('employeeView').style.display = 'block';
    }
}

// PARTNER DATA LOADING
function loadPartnerData() {
    // 1. Listen for Approval Requests
    onSnapshot(collection(db, "users"), (snap) => {
        const list = [];
        const staff = [];
        snap.forEach(d => {
            const data = d.data();
            if(!data.isApproved) list.push({id: d.id, ...data});
            else staff.push({id: d.id, ...data});
        });

        // Update Approval UI
        const appDiv = document.getElementById('approvalList');
        appDiv.innerHTML = list.length === 0 ? "No pending approvals" : list.map(u => `
            <div class="pending-user">
                <span>${u.email}</span>
                <button class="btn-approve" onclick="approveUser('${u.id}')">Approve</button>
            </div>
        `).join('');

        // Update Staff List
        const staffDiv = document.getElementById('staffList');
        staffDiv.innerHTML = staff.map(s => `
            <div class="pending-user">
                <span style="font-size:12px;">${s.email}</span>
                <span style="color:var(--green); font-size:10px;">ACTIVE</span>
            </div>
        `).join('');
    });

    // 2. Listen for Notifications (Attendance/Tasks)
    onSnapshot(query(collection(db, "notifications"), orderBy("timestamp", "desc")), (snap) => {
        const notifDiv = document.getElementById('notifList');
        notifDiv.innerHTML = snap.docs.slice(0, 10).map(d => {
            const n = d.data();
            return `<div class="notif-card">
                <span>${n.message}</span>
                <span style="color:var(--muted)">${new Date(n.timestamp?.seconds*1000).toLocaleTimeString()}</span>
            </div>`;
        }).join('');
    });
}

// APPROVAL FUNCTION
window.approveUser = async (id) => {
    await updateDoc(doc(db, "users", id), { isApproved: true });
    alert("Employee Approved!");
};

// LOGOUT
document.getElementById('logoutBtn').onclick = () => location.reload();

</script>
</body>
</html>
