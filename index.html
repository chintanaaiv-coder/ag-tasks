<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>AGA Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080a12;--surface:#111420;--card:#1a1f2e;--border:#262c40;
  --accent:#6366f1;--green:#10b981;--text:#ffffff;--muted:#8892aa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;min-height:100vh;}

.mobile-container { width: 100%; max-width: 400px; padding: 40px 24px; text-align: center; }

/* BRANDING */
.logo-box { width: 100px; height: 100px; background: #000; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
.logo-box img { width: 80%; }
.company-name { font-family: "Syne", sans-serif; font-size: 28px; font-weight: 800; line-height: 1.1; margin-bottom: 10px; text-transform: uppercase; letter-spacing: -1px; }
.sub-title { color: var(--muted); font-size: 16px; margin-bottom: 40px; }

/* FORMS */
.login-section { text-align: left; margin-top: 20px; }
.sec-label { font-size: 10px; font-weight: 700; color: #4a5680; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
.f-lbl { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: block; }
.f-inp { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; margin-bottom: 15px; font-size: 15px; }
.forgot { text-align: right; font-size: 11px; color: var(--accent); margin-top: -5px; margin-bottom: 20px; cursor: pointer; }

/* BUTTONS */
.btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; transition: 0.2s; }
.btn-emp { background: var(--green); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
.btn-partner { background: #6366f1; color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
.btn:active { transform: scale(0.98); }

.reg-text { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }
.reg-text span { color: var(--accent); cursor: pointer; }
.or-divider { margin: 25px 0; display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 11px; font-weight: 700; }
.or-line { flex: 1; height: 1px; background: var(--border); }

/* DASHBOARD HIDDEN BY DEFAULT */
#mainDash { display: none; padding: 20px; width: 100%; }
</style>
</head>
<body>

<div class="mobile-container" id="loginPage">
    <div class="logo-box">
        <h1 style="color:white; font-family:serif;">AG</h1>
    </div>
    
    <div class="company-name">Acharya<br>Gehlot &<br>Associates</div>
    <div class="sub-title">Task Assigner</div>

    <div class="login-section">
        <span class="sec-label">Employee Login</span>
        <label class="f-lbl">Your Name</label>
        <input type="text" id="empName" class="f-inp" placeholder="Enter name">
        <label class="f-lbl">Password</label>
        <input type="password" id="empPass" class="f-inp" placeholder="••••••••">
        <div class="forgot">Forgot Password?</div>
        
        <button class="btn btn-emp" onclick="login('employee')">
            <span>👤</span> Login as Employee
        </button>
        
        <div class="reg-text">New employee? <span>Register here →</span></div>

        <div class="or-divider">
            <div class="or-line"></div> OR <div class="or-line"></div>
        </div>

        <button class="btn btn-partner" onclick="login('partner')">
            <span>G</span> Login as Partner
        </button>
    </div>
</div>

<div id="mainDash">
    <h2 id="dashTitle"></h2>
    <p id="dashSub"></p>
    <button onclick="location.reload()" style="margin-top:20px; color:red; background:none; border:none; cursor:pointer;">Logout</button>
</div>

<script type="module">
// Your Partner ID is now hardcoded here
const PARTNER_EMAIL = "chintan@acharyagehlot.com";

window.login = (role) => {
    const loginPage = document.getElementById('loginPage');
    const mainDash = document.getElementById('mainDash');
    const dashTitle = document.getElementById('dashTitle');
    const dashSub = document.getElementById('dashSub');

    loginPage.style.display = 'none';
    mainDash.style.display = 'block';

    if(role === 'partner') {
        dashTitle.innerText = "Partner Dashboard";
        dashSub.innerText = "Welcome back, Chintan. Logging in as " + PARTNER_EMAIL;
        // Here you would add the logic to show your notifications and approvals
    } else {
        const name = document.getElementById('empName').value || "Employee";
        dashTitle.innerText = "Hello, " + name;
        dashSub.innerText = "Checking your assigned tasks...";
    }
}
</script>

</body>
</html>
