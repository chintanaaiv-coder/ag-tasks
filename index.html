<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AGA Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b101b;
            --input-bg: #e8f0fe;
            --accent-green: #10b981;
            --accent-blue: #6366f1;
            --text-dim: #717b91;
            /* Filter to turn the black PNG into white */
            --logo-white: brightness(0) invert(1);
        }

        /* Logic for your future light theme */
        .light-theme {
            --bg-dark: #ffffff;
            --input-bg: #f1f5f9;
            --logo-white: none;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-shell {
            width: 100%;
            max-width: 400px;
            padding: 50px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* THE LOGO: Using your AGA Logo.png asset */
        .logo-container {
            width: 110px;
            height: 110px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .logo-container img {
            width: 80%;
            height: auto;
            filter: var(--logo-white);
            image-rendering: -webkit-optimize-contrast;
        }

        .brand-title {
            font-family: 'Syne', sans-serif;
            font-size: 34px;
            font-weight: 800;
            line-height: 0.95; /* Ultra-tight like the screenshot */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .brand-subtitle {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* FORM SECTION */
        .section-header {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 700;
            color: #3b4252;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .input-group { width: 100%; margin-bottom: 20px; }
        .label { font-size: 14px; color: #94a3b8; margin-bottom: 8px; display: block; }
        
        .f-input {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 18px;
            color: #1e293b;
            font-size: 16px;
            font-weight: 600;
            outline: none;
        }

        .forgot-link {
            text-align: right;
            font-size: 13px;
            color: #3b82f6;
            margin-top: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            transition: opacity 0.2s;
        }

        .btn-employee {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-partner {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
            margin-top: 12px;
        }

        .g-logo { width: 22px; height: 22px; }

        /* DIVIDER */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #232d3f; }
        .divider span { padding: 0 15px; }

        .reg-text { font-size: 13px; color: var(--text-dim); margin-top: 15px; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="logo-container">
            <img src="AGA Logo.png" alt="AGA Logo">
        </div>
        
        <h1 class="brand-title">Acharya<br>Gehlot &<br>Associates</h1>
        <p class="brand-subtitle">Task Assigner</p>

        <span class="section-header">Employee Login</span>

        <div class="input-group">
            <label class="label">Your Name</label>
            <input type="text" class="f-input" value="Heer patel">
        </div>

        <div class="input-group">
            <label class="label">Password</label>
            <input type="password" class="f-input" value="password">
            <p class="forgot-link">Forgot Password?</p>
        </div>

        <button class="btn btn-employee">
            <span>👤</span> Login as Employee
        </button>
        
        <p class="reg-text">New employee? <span style="color:#3b82f6; font-weight:600; cursor:pointer;">Register here →</span></p>

        <div class="divider"><span>OR</span></div>
