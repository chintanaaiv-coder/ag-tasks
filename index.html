<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#6366f1"/>
<title>AGA Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080a0f;--surface:#0f1219;--card:#141923;--border:#1a2035;
  --accent:#6366f1;--cyan:#22d3ee;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --text:#dde4f0;--muted:#4a5680;--soft:#8892aa;
}
:root.light{
  --bg:#f0f2f7;--surface:#ffffff;--card:#e8ecf4;--border:#d0d7e8;
  --accent:#4f46e5;--cyan:#0891b2;--green:#059669;--red:#dc2626;--yellow:#d97706;
  --text:#1a2035;--muted:#6b7280;--soft:#4b5563;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);}
/* TOPBAR */
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:100;}
.brand{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;color:var(--accent);}
.brand span{color:var(--cyan);}
#fbStatus{font-size:8px;color:var(--muted);margin-left:4px;}
/* APP CONTENT */
#app{position:fixed;top:52px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}
#app.no-topbar{top:0;}
/* LOGIN */
.pg-login{padding:28px 22px 40px;max-width:420px;margin:0 auto;}
.login-logo{text-align:center;margin-bottom:12px;}
.login-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;color:#fff;text-align:center;}
.login-sub{font-size:11px;color:var(--muted);text-align:center;margin-top:3px;}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.f-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;margin-bottom:4px;}
.f-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:13px;color:var(--text);font-family:"DM Sans",sans-serif;
  margin-bottom:10px;-webkit-text-fill-color:var(--text);}
.f-inp:focus{outline:none;border-color:var(--accent);}
.f-inp::placeholder{color:var(--muted);}
.f-inp:-webkit-autofill{-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--card) inset!important;}
:root.light .f-inp{-webkit-text-fill-color:#1a2035;-webkit-box-shadow:0 0 0 1000px #e8ecf4 inset!important;}
select.f-inp,input[type=date].f-inp{cursor:pointer;}
select.f-inp option{background:var(--card);color:var(--text);}
.app-btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;margin-bottom:8px;}
.btn-emp{background:var(--accent);color:#fff;}
.btn-boss{background:var(--surface);border:1px solid var(--accent);color:var(--accent);}
.or-row{display:flex;align-items:center;gap:8px;margin:6px 0;}
.or-line{flex:1;height:1px;background:var(--border);}
.or-text{font-size:10px;color:var(--muted);font-weight:600;}
.forgot-link{text-align:right;margin-bottom:10px;margin-top:-4px;}
.forgot-link a{font-size:10px;color:var(--accent);cursor:pointer;}
/* BOSS DASHBOARD */
.pg{background:var(--bg);padding-bottom:20px;}
.emp-head{padding:16px 16px 8px;}
.eh-greet{font-family:"Syne",sans-serif;font-size:18px;font-weight:800;color:#fff;}
.eh-sub{font-size:10px;color:var(--muted);margin-top:2px;}
/* TASK CARDS */
.task-c{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin:0 12px 8px;cursor:pointer;}
.task-c:active{opacity:0.8;}
.tc-row1{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.tc-client{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.tc-desc{font-size:11px;color:var(--muted);margin-bottom:5px;line-height:1.4;}
.tc-meta{display:flex;gap:10px;font-size:10px;color:var(--muted);}
.tc-assign{font-size:10px;color:var(--soft);margin-top:4px;}
.pbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;}
.ph{background:rgba(239,68,68,0.2);color:var(--red);}
.pm{background:rgba(245,158,11,0.2);color:var(--yellow);}
.pl{background:rgba(16,185,129,0.2);color:var(--green);}
.sbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:auto;}
.sp{background:rgba(99,102,241,0.2);color:var(--accent);}
.sd{background:rgba(16,185,129,0.2);color:var(--green);}
/* FILTER BAR */
.filter-bar{padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.fbtn{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif;}
.fbtn.act{background:var(--accent);color:#fff;border-color:var(--accent);}
/* FORM */
.pg-form{background:var(--bg);padding:16px 16px 80px;}
.ct-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;}
.ct-ttl{font-family:"Syne",sans-serif;font-size:17px;font-weight:800;color:#fff;}
.fg{margin-bottom:12px;}
.fg-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.fg-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;font-size:12px;color:var(--text);font-family:"DM Sans",sans-serif;
  -webkit-text-fill-color:var(--text);}
.fg-inp:focus{outline:none;border-color:var(--accent);}
.fg-inp:-webkit-autofill{-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--card) inset!important;}
select.fg-inp{cursor:pointer;}
select.fg-inp option{background:var(--card);color:var(--text);}
input[type=date].fg-inp{cursor:pointer;}
.fg-ta{min-height:70px;resize:vertical;}
.prio-row{display:flex;gap:6px;}
.poption{flex:1;padding:7px;text-align:center;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--muted);}
.poption.sel.po-h{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red);}
.poption.sel.po-m{background:rgba(245,158,11,0.15);border-color:var(--yellow);color:var(--yellow);}
.poption.sel.po-l{background:rgba(16,185,129,0.15);border-color:var(--green);color:var(--green);}
.submit-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;}
.submit-btn:disabled{opacity:0.4;}
.at-logout{background:var(--red);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;}
/* EMPLOYEE DASHBOARD */
.emp-stats{display:flex;gap:10px;padding:0 16px 12px;}
.es{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.es-n{font-size:22px;font-weight:800;font-family:"Syne",sans-serif;}
.es-n.pend{color:var(--yellow);}
.es-n.done{color:var(--green);}
.es-l{font-size:9px;color:var(--muted);margin-top:2px;}
.emp-tasks{padding:0 12px 12px;}
.emp-task-c{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);}
.task-from-partner{border-left:3px solid var(--accent);background:rgba(99,102,241,0.05);}
.task-from-senior{border-left:3px solid var(--yellow);background:rgba(245,158,11,0.05);}
.task-source-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:6px;}
.tsb-partner{background:rgba(99,102,241,0.2);color:var(--accent);}
.tsb-senior{background:rgba(245,158,11,0.2);color:var(--yellow);}
.complete-btn{width:100%;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.35);
  color:var(--green);border-radius:8px;padding:8px;font-size:11px;font-weight:700;cursor:pointer;
  margin-top:8px;font-family:"DM Sans",sans-serif;}
/* CONFIRM OVERLAY */
.confirm-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.confirm-overlay.open{opacity:1;pointer-events:all;}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:22px 20px;width:290px;text-align:center;}
.cd-icon{font-size:32px;margin-bottom:10px;}
.cd-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:800;color:#fff;margin-bottom:5px;}
.cd-msg{font-size:12px;color:var(--muted);margin-bottom:10px;}
.cd-detail{font-size:11px;color:var(--soft);background:var(--card);border-radius:8px;
  padding:10px;margin-bottom:14px;text-align:left;line-height:1.7;}
.cd-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
.cd-btns{display:flex;gap:8px;}
.cd-no{flex:1;padding:10px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:"DM Sans",sans-serif;}
.cd-yes{flex:2;padding:10px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:"DM Sans",sans-serif;}
.cd-yes.success{background:var(--green);}
.cd-yes.danger{background:var(--red);}
.cd-yes.primary{background:var(--accent);}
/* PIN OVERLAY */
.pin-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.85);
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(6px);}
.pin-overlay.open{opacity:1;pointer-events:all;}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 20px;width:290px;text-align:center;}
.pin-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px;}
.pin-sub{font-size:11px;color:var(--muted);margin-bottom:12px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:12px 0;}
.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--border);}
.pin-dot.filled{background:var(--accent);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:220px;margin:0 auto 12px;}
.pin-key{padding:14px;border-radius:10px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-size:18px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;}
.pin-key.del{font-size:14px;}
.pin-error{color:var(--red);font-size:11px;min-height:16px;margin-bottom:8px;}
.pin-cancel{font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 18px;font-size:12px;color:var(--text);z-index:500;
  opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{border-color:var(--red);color:var(--red);}
/* ATTENDANCE */
.att-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin:0 12px 12px;}
.att-btn-in{flex:1;padding:10px;border:2px solid rgba(16,185,129,0.4);border-radius:8px;background:rgba(16,185,129,0.1);color:var(--green);font-weight:700;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.att-btn-out{flex:1;padding:10px;border:2px solid rgba(239,68,68,0.4);border-radius:8px;background:rgba(239,68,68,0.1);color:var(--red);font-weight:700;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
/* MANAGE USERS */
.section-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 6px;}
.user-card{display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.user-info{flex:1;}
.user-name{font-size:13px;font-weight:600;color:var(--text);}
.user-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.btn-approve{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.35);color:var(--green);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;}
.btn-delete{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);color:var(--red);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;}
</style>
</head>
<body>
<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM OVERLAY -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="cd-icon" id="cdIcon"></div>
    <div class="cd-title" id="cdTitle"></div>
    <div class="cd-msg" id="cdMsg"></div>
    <div class="cd-detail" id="cdDetail" style="display:none;"></div>
    <div class="cd-btns">
      <button class="cd-no" onclick="closeConfirm()">✕ No, Cancel</button>
      <button class="cd-yes primary" id="cdYes">✓ Yes</button>
    </div>
  </div>
</div>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title" id="pinTitle">Enter Your PIN</div>
    <div class="pin-sub" id="pinSub">4-digit attendance PIN</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinKey('del')">⌫</button>
    </div>
    <div class="pin-error" id="pinError"></div>
    <span class="pin-cancel" onclick="closePinDialog()">Cancel</span>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" id="mainTopbar">
  <div class="brand">AGA <span>Tasks</span><span id="fbStatus"> ⏳</span></div>
  <div id="topbarRight"></div>
</div>

<!-- APP -->
<div id="app" class="no-topbar"></div>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,setDoc,getDoc,getDocs,deleteDoc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyC4oF4oNzPtQNPaKQaOnnJeIFKXLNMOA9g",authDomain:"ag-task-assigner.firebaseapp.com",projectId:"ag-task-assigner",storageBucket:"ag-task-assigner.appspot.com",messagingSenderId:"694340088537",appId:"1:694340088537:web:1f14fb2bf3b62d5c7ae7bc"};
const app=initializeApp(cfg);
const db=getFirestore(app);
function setLive(ok){const el=document.getElementById("fbStatus");if(el)el.textContent=ok?" 🔥":"";}
async function seedEmps(){
  const defs=[
    {name:"Heer Patel",code:"001",email:"heer@aga.com",mobile:"",password:"pass001",registered:true,approved:true,pendingApproval:false},
    {name:"Bhavana Shinde",code:"002",email:"bhavana@aga.com",mobile:"",password:"pass002",registered:true,approved:true,pendingApproval:false},
    {name:"Moksha Jain",code:"003",email:"moksha@aga.com",mobile:"",password:"pass003",registered:true,approved:true,pendingApproval:false},
    {name:"Dhanisha Solanki",code:"004",email:"dhanisha@aga.com",mobile:"",password:"pass004",registered:true,approved:true,pendingApproval:false},
    {name:"Prapti Padhya",code:"005",email:"prapti@aga.com",mobile:"",password:"pass005",registered:true,approved:true,pendingApproval:false},
  ];
  for(const e of defs) await setDoc(doc(db,"employees",e.code),e);
}
// Employees
onSnapshot(collection(db,"employees"),snap=>{
  if(snap.empty){seedEmps();return;}
  const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));
  if(window._st){
    window._st.employees=list;
    // Alert partner of pending registrations
    const pending=list.filter(e=>e.pendingApproval&&!e.approved);
    if(pending.length>0&&window._st.user?.role==="boss"&&window._st.screen==="boss"){
      if(window._re) window._re();
    }
  }
  setLive(true);
  if(window._re) window._re();
},()=>setLive(false));
// Tasks
onSnapshot(query(collection(db,"tasks"),orderBy("createdAt","desc")),snap=>{
  const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));
  if(window._st) window._st.tasks=list;
  if(window._re) window._re();
});
// Attendance
onSnapshot(query(collection(db,"attendance"),orderBy("createdAt","desc")),snap=>{
  const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));
  if(window._st) window._st.attendance=list;
  if(window._re) window._re();
});
// Notifications — alert partner of new registrations
onSnapshot(query(collection(db,"notifications"),orderBy("createdAt","desc")),snap=>{
  const list=[];snap.forEach(d=>list.push({id:d.id,...d.data()}));
  if(window._st) window._st.notifications=list;
  // Show toast for brand new registration (last 15 seconds)
  if(window._st?.user?.role==="boss"){
    const fresh=list.find(n=>n.type==="registration"&&!n.read&&(Date.now()-n.createdAt)<15000);
    if(fresh&&window.toast) window.toast("🆕 New registration: "+fresh.body);
    if(window._re) window._re();
  }
});
window.fbSaveTask   = async t    =>{try{await setDoc(doc(db,"tasks",t.id),t);}catch(e){console.error(e);}};
window.fbUpdateTask = async(id,d)=>{try{const{updateDoc:u}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");await u(doc(db,"tasks",id),d);}catch(e){console.error(e);}};
window.fbDeleteTask = async id   =>{try{await deleteDoc(doc(db,"tasks",id));}catch(e){console.error(e);}};
window.fbSaveEmp    = async e    =>{try{await setDoc(doc(db,"employees",e.code),e);}catch(e){console.error(e);}};
window.fbUpdateEmp  = async(c,d) =>{try{const{updateDoc:u}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");await u(doc(db,"employees",c),d);}catch(e){console.error(e);}};
window.fbDeleteEmp  = async code =>{try{await deleteDoc(doc(db,"employees",code));}catch(e){console.error(e);}};
window.fbSaveAtt    = async a    =>{try{await setDoc(doc(db,"attendance",a.id),a);}catch(e){console.error(e);}};
window.fbSaveNotif  = async n    =>{try{await setDoc(doc(db,"notifications",n.id),n);}catch(e){console.error(e);}};

// ═══ RENDER ═══
function render(){
  const app=document.getElementById("app");
  if(!app) return;
  app.innerHTML=buildScreen();
  // Topbar visibility
  const noTopbar=["login","partnerLogin","register","changePass"].includes(state.screen);
  document.getElementById("mainTopbar").style.display=noTopbar?"none":"flex";
  app.classList.toggle("no-topbar",noTopbar);
  // Topbar buttons
  updateTopbar();
}
window._re=render;

function updateTopbar(){
  const tr=document.getElementById("topbarRight");
  if(!tr||!state.user) return;
  const pending=state.employees.filter(e=>e.pendingApproval&&!e.approved).length;
  const badge=pending>0?`<sup style="background:var(--red);color:#fff;border-radius:8px;padding:0 4px;font-size:9px;">${pending}</sup>`:"";
  if(state.user.role==="boss"){
    tr.innerHTML=`
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="navigate('manageUsers')" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--red);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;">👥${badge}</button>
        <button onclick="toggleTheme()" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;">🌓</button>
        <button class="at-logout" onclick="doLogout()">Logout</button>
      </div>`;
  } else {
    tr.innerHTML=`<div style="display:flex;gap:6px;">
      <button onclick="toggleTheme()" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;">🌓</button>
      <button class="at-logout" onclick="doLogout()">Logout</button>
    </div>`;
  }
}

function buildScreen(){
  const s=state.screen;
  if(s==="login")        return buildLogin();
  if(s==="partnerLogin") return buildPartnerLogin();
  if(s==="changePass")   return buildChangePass();
  if(s==="register")     return buildRegister();
  if(s==="boss")         return buildBoss();
  if(s==="createTask")   return buildCreate();
  if(s==="editTask")     return buildEdit();
  if(s==="manageUsers")  return buildManageUsers();
  if(s==="taskReport")   return buildTaskReport();
  if(s==="reassign")     return buildReassign();
  if(s==="employee")     return buildEmployee();
  if(s==="attReport")    return buildAttReport();
  return buildLogin();
}

function navigate(s){state.screen=s;render();}

// ═══ TOAST ═══
let toastTimer;
function toast(msg,err){
  const el=document.getElementById("toast");
  if(!el) return;
  el.textContent=msg;
  el.className="toast"+(err?" err":"");
  void el.offsetWidth;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),3000);
}
window.toast=toast;

// ═══ CONFIRM ═══
let confirmCb=null;
function showConfirm({icon,title,msg,detail,yesLabel,yesType,onYes}){
  document.getElementById("cdIcon").textContent=icon||"❓";
  document.getElementById("cdTitle").textContent=title||"";
  document.getElementById("cdMsg").textContent=msg||"";
  const det=document.getElementById("cdDetail");
  if(detail){det.innerHTML=detail;det.style.display="block";}
  else det.style.display="none";
  const yesBtn=document.getElementById("cdYes");
  yesBtn.textContent=yesLabel||"✓ Yes";
  yesBtn.className="cd-yes "+(yesType==="danger"?"danger":yesType==="success"?"success":"primary");
  confirmCb=onYes;
  document.getElementById("confirmOverlay").classList.add("open");
}
function closeConfirm(){document.getElementById("confirmOverlay").classList.remove("open");confirmCb=null;}
document.getElementById("cdYes").onclick=()=>{closeConfirm();if(confirmCb)confirmCb();};

function doRegister(){
  const name=(document.getElementById("regName")?.value||"").trim();
  const mobile=(document.getElementById("regMobile")?.value||"").trim();
  const email=(document.getElementById("regEmail")?.value||"").trim();
  const pass=(document.getElementById("regPass")?.value||"").trim();
  const conf=(document.getElementById("regConf")?.value||"").trim();
  if(!name){toast("Enter your full name",true);return;}
  if(!mobile||mobile.length!==10){toast("Enter valid 10-digit mobile",true);return;}
  if(!email||!email.includes("@")){toast("Enter valid email",true);return;}
  if(pass.length<6){toast("Password min 6 characters",true);return;}
  if(pass!==conf){toast("Passwords do not match",true);return;}
  const dup=state.employees.find(e=>e.name.toLowerCase()===name.toLowerCase());
  if(dup){toast("Name already registered. Contact partner.",true);return;}
  const maxCode=state.employees.reduce((m,e)=>Math.max(m,parseInt(e.code)||0),0);
  const code=String(maxCode+1).padStart(3,"0");
  const emp={name,code,mobile,email,password:pass,registered:true,approved:false,pendingApproval:true,registeredAt:Date.now()};
  state.employees.push(emp);
  if(window.fbSaveEmp) window.fbSaveEmp(emp);
  const notif={id:"n"+Date.now(),to:"partner",type:"registration",
    body:name+" has registered and is awaiting approval",read:false,createdAt:Date.now()};
  if(window.fbSaveNotif) window.fbSaveNotif(notif);
  toast("Registration submitted! Awaiting partner approval.");
  navigate("login");
}

  const emp=state.employees.find(e=>e.code===code);
  showConfirm({
    icon:"✅",title:"Are You Sure?",
    msg:`Approve ${name} as an active employee?`,
    detail:`<div class="cd-lbl">Employee</div><strong>${name}</strong>
      <br/>Mobile: ${emp?.mobile||"—"}
      <br/>Email: ${emp?.email||"—"}
      <div class="cd-lbl" style="margin-top:8px;">Default Password</div>
      <strong style="color:var(--accent);font-size:14px;">${defaultPass}</strong>
      <br/><span style="font-size:10px;color:var(--muted);">Share this with the employee</span>`,
    yesLabel:"✅ Yes, Approve",yesType:"success",
    onYes:()=>approveUser(code,name,defaultPass)
  });
}

function approveUser(code,name,defaultPass){
  const emp=state.employees.find(e=>e.code===code);
  if(!emp) return;
  emp.approved=true;emp.pendingApproval=false;emp.password=defaultPass;
  if(window.fbSaveEmp) window.fbSaveEmp(emp);
  toast(`${name} approved! Password: ${defaultPass}`);
  render();
}

function confirmDeleteUser(code,name){
  showConfirm({
    icon:"🗑️",title:"Are You Sure?",
    msg:`Remove ${name} from the organisation?`,
    detail:`<div class="cd-lbl">Employee</div><strong>${name}</strong><br/>Code: ${code}
      <br/><span style="color:var(--red);font-size:10px;">⚠️ This cannot be undone.</span>`,
    yesLabel:"🗑️ Yes, Delete",yesType:"danger",
    onYes:()=>{
      state.employees=state.employees.filter(e=>e.code!==code);
      if(window.fbDeleteEmp) window.fbDeleteEmp(code);
      toast(name+" removed");
      render();
    }
  });
}

// ═══ TASK REPORT ═══
function buildTaskReport(){
  const from=state.reportFrom||"";
  const to=state.reportTo||"";
  const data=state.tasks.filter(t=>{
    if(t.status!=="completed") return false;
    if(from&&t.due<from) return false;
    if(to&&t.due>to) return false;
    return true;
  });
  return `<div class="pg-form">
    <div class="ct-head">
      <div class="back-btn" onclick="navigate('boss')">←</div>
      <div class="ct-ttl">Task Report</div>
    </div>
    <div class="fg"><div class="fg-lbl">From Date</div>
      <input class="fg-inp" type="date" value="${from}" onchange="state.reportFrom=this.value;render()"/></div>
    <div class="fg"><div class="fg-lbl">To Date</div>
      <input class="fg-inp" type="date" value="${to}" onchange="state.reportTo=this.value;render()"/></div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;">
      <div style="display:flex;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;color:var(--muted);">
        <div style="flex:2;">CLIENT</div><div style="flex:1.5;">ASSIGNED</div><div style="flex:1;">DUE</div>
      </div>
      ${data.length?data.map(t=>`<div style="display:flex;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;">
        <div style="flex:2;font-weight:600;">${t.client}</div>
        <div style="flex:1.5;color:var(--muted);">${(t.assignedTo||"").split(" ")[0]}</div>
        <div style="flex:1;color:var(--muted);">${t.due}</div>
      </div>`).join(""):`<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px;">No completed tasks in range</div>`}
    </div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;">${data.length} completed task(s)</div>
    <button class="submit-btn" onclick="exportCSV()" ${!data.length?"disabled":""} style="opacity:${data.length?1:0.4};">📥 Download Excel/CSV</button>
  </div>`;
}

function exportCSV(){
  const from=state.reportFrom||"";const to=state.reportTo||"";
  const data=state.tasks.filter(t=>{
    if(t.status!=="completed") return false;
    if(from&&t.due<from) return false;
    if(to&&t.due>to) return false;
    return true;
  });
  const rows=[["Client","Description","Category","Priority","Assigned To","Due Date","Status"],...data.map(t=>[t.client,t.desc,t.category,t.priority,t.assignedTo,t.due,"Completed"])];
  const csv=rows.map(r=>r.map(c=>`"${(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`AGA_Tasks_${from||"all"}_to_${to||"all"}.csv`;
  a.click();
  toast("Downloaded ✅ Open in Excel");
}

// ═══ EMPLOYEE DASHBOARD ═══
function buildEmployee(){
  const myTasks=state.tasks.filter(t=>t.assignedTo===state.user?.name);
  const pend=myTasks.filter(t=>t.status==="pending");
  const done=myTasks.filter(t=>t.status==="completed");
  const attToday=getAttToday();

  const taskCards=pend.map(t=>{
    const byPartner=!t.assignedBy||t.assignedBy==="Partner"||t.assignedBy==="Chintan";
    const bySenior=SENIOR_EMP.includes(t.assignedBy||"");
    const cardClass=byPartner?"task-from-partner":bySenior?"task-from-senior":"";
    const badge=byPartner?`<span class="task-source-badge tsb-partner">🔵 From Partner</span>`:
                bySenior?`<span class="task-source-badge tsb-senior">🟡 From ${t.assignedBy}</span>`:"";
    const canRe=SENIOR_EMP.includes(state.user?.name);
    return `<div class="emp-task-c ${cardClass}">
      ${badge}
      <div class="tc-row1">
        <div class="pbadge ${t.priority==="high"?"ph":t.priority==="medium"?"pm":"pl"}">${(t.priority||"").toUpperCase()}</div>
      </div>
      <div class="tc-client">${t.client}</div>
      <div class="tc-desc">${(t.desc||"").substring(0,80)}</div>
      <div class="tc-meta"><span>📅 ${t.due}</span><span>📁 ${t.category}</span></div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button class="complete-btn" style="flex:2;" onclick="empComplete('${t.id}')">✅ Mark Complete</button>
        ${canRe?`<button style="flex:1;padding:8px;border:1px solid rgba(245,158,11,0.4);border-radius:8px;background:rgba(245,158,11,0.1);color:var(--yellow);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;" onclick="openReassign('${t.id}')">↪️ Reassign</button>`:""}
      </div>
    </div>`;
  }).join("");

  return `<div class="pg">
    <div class="emp-head">
      <div class="eh-greet">Hello, ${state.user?.name||""} 👋</div>
      <div class="eh-sub">Employee Dashboard</div>
    </div>
    <div class="emp-stats">
      <div class="es"><div class="es-n pend">${pend.length}</div><div class="es-l">Pending</div></div>
      <div class="es"><div class="es-n done">${done.length}</div><div class="es-l">Completed</div></div>
    </div>
    <div class="att-card">
      <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:10px;">📍 Mark Attendance</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <button class="att-btn-in" onclick="markAtt('IN')" ${attToday.in?"disabled style='opacity:0.4;'":""}>
          ${attToday.in?"✅ Checked IN ("+attToday.inTime+")":"✅ Check IN"}
        </button>
        <button class="att-btn-out" onclick="markAtt('OUT')" ${attToday.out?"disabled style='opacity:0.4;'":""}>
          ${attToday.out?"🔴 Checked OUT ("+attToday.outTime+")":"🔴 Check OUT"}
        </button>
      </div>
      <div style="font-size:10px;color:var(--muted);">📍 ${state.lastLat?"Location: "+state.lastLat.toFixed(4)+", "+state.lastLng.toFixed(4):"Acquiring location..."}</div>
    </div>
    <div class="emp-tasks">
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px;">PENDING TASKS (${pend.length})</div>
      ${pend.length?taskCards:`<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px;">No pending tasks 🎉</div>`}
      ${done.length?`<div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;margin:12px 0 8px;">COMPLETED (${done.length})</div>
        ${done.map(t=>`<div class="emp-task-c" style="opacity:0.6;">
          <div class="tc-client">${t.client}</div>
          <div class="tc-desc">${(t.desc||"").substring(0,60)}</div>
        </div>`).join("")}`:""}
    </div>
  </div>`;
}

function getAttToday(){
  const today=new Date().toISOString().split("T")[0];
  const name=state.user?.name;
  const recs=state.attendance.filter(a=>a.empName===name&&a.date===today);
  const inRec=recs.find(a=>a.type==="IN");
  const outRec=recs.find(a=>a.type==="OUT");
  return{in:!!inRec,out:!!outRec,inTime:inRec?.time||"",outTime:outRec?.time||""};
}

function markAtt(type){
  const att=getAttToday();
  if(type==="IN"&&att.in){toast("Already checked IN today",true);return;}
  if(type==="OUT"&&att.out){toast("Already checked OUT today",true);return;}
  if(type==="OUT"&&!att.in){toast("Please check IN first",true);return;}
  confirmAttendance(type,()=>{
    const now=new Date();
    const time=now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});
    const date=now.toISOString().split("T")[0];
    const rec={id:"att"+Date.now(),empName:state.user?.name,type,date,time,
      lat:state.lastLat,lng:state.lastLng,
      location:state.lastLat?state.lastLat.toFixed(4)+", "+state.lastLng.toFixed(4):"unknown",
      createdAt:Date.now()};
    // Improve location via reverse geocode
    if(state.lastLat){
      fetch("https://nominatim.openstreetmap.org/reverse?lat="+state.lastLat+"&lon="+state.lastLng+"&format=json")
        .then(r=>r.json()).then(d=>{
          const a=d.address;
          rec.location=[a.road||a.pedestrian,a.suburb||a.neighbourhood||a.village||a.town||a.city,a.city||a.county].filter(Boolean).slice(0,2).join(", ");
        }).catch(()=>{});
    }
    state.attendance.push(rec);
    if(window.fbSaveAtt) window.fbSaveAtt(rec);
    toast("Attendance marked: "+type+" at "+time+" ✅");
    render();
  });
}

// ═══ ATTENDANCE REPORT ═══
function buildAttReport(){
  const name=state.user?.name;
  const recs=state.attendance.filter(a=>a.empName===name).slice(0,30);

      <div class="back-btn" onclick="navigate('employee')">←</div>
      <div class="ct-ttl">My Attendance</div>
    </div>
    ${recs.length?recs.map(r=>`

          <div style="font-size:12px;font-weight:700;color:${r.type==="IN"?"var(--green)":"var(--red)"};">${r.type==="IN"?"✅ IN":"🔴 OUT"}</div>

// ═══ REASSIGN ═══
function openReassign(id){state.reassignTaskId=id;state.f.reassignTo="";navigate("reassign");}

function buildReassign(){
  const t=state.tasks.find(x=>x.id===state.reassignTaskId);
  if(!t) return `<div class="pg-form"><div class="ct-head"><div class="back-btn" onclick="navigate('employee')">←</div><div class="ct-ttl">Reassign</div></div></div>`;
  const opts=state.employees.filter(e=>e.name!==state.user?.name&&e.approved!==false).map(e=>`<option value="${e.name}">${e.name}</option>`).join("");
  return `<div class="pg-form">
    <div class="ct-head">
      <div class="back-btn" onclick="navigate('employee')">←</div>
      <div class="ct-ttl">Reassign Task</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);">Task</div>
      <div style="font-size:13px;font-weight:700;">${t.client}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px;">${(t.desc||"").substring(0,80)}</div>
    </div>
    <div class="fg"><div class="fg-lbl">Reassign To</div>
      <select class="fg-inp" onchange="state.f.reassignTo=this.value">
        <option value="">— Select employee —</option>${opts}
      </select></div>
    <button class="submit-btn" onclick="confirmReassign()">↪️ Confirm Reassign</button>
  </div>`;
}

function confirmReassign(){
  if(!state.f.reassignTo){toast("Select an employee",true);return;}
  const t=state.tasks.find(x=>x.id===state.reassignTaskId);
  if(!t) return;
  showConfirm({
    icon:"↪️",title:"Are You Sure?",
    msg:`Reassign to ${state.f.reassignTo}?`,
    detail:`<div class="cd-lbl">Task</div>${t.client}<div class="cd-lbl">From</div>${t.assignedTo}<div class="cd-lbl">To</div>${state.f.reassignTo}`,
    yesLabel:"↪️ Yes, Reassign",yesType:"success",
    onYes:()=>{
      t.assignedTo=state.f.reassignTo;t.assignedBy=state.user?.name;
      if(window.fbUpdateTask) window.fbUpdateTask(t.id,{assignedTo:t.assignedTo,assignedBy:t.assignedBy});
      toast("Reassigned to "+t.assignedTo+" ✅");
      navigate("employee");
    }
  });
}

function empComplete(id){
  const t=state.tasks.find(x=>x.id===id);
  if(!t) return;
  showConfirm({icon:"✅",title:"Mark Complete?",msg:`Mark "${t.client}" as done?`,
    yesLabel:"✅ Yes",yesType:"success",
    onYes:()=>{t.status="completed";if(window.fbUpdateTask)window.fbUpdateTask(id,{status:"completed"});toast("Task completed ✅");render();}});
}

// ═══ PIN / BIOMETRIC ═══
async function confirmAttendance(type,onSuccess){
  if(window.PublicKeyCredential){
    try{
      const avail=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if(avail){
        const emp=state.employees.find(e=>e.name===state.user?.name);
        if(emp?.credentialId){
          const ch=new Uint8Array(32);crypto.getRandomValues(ch);
          try{
            const a=await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{type:"public-key",id:b64ToBuffer(emp.credentialId)}],userVerification:"required",timeout:30000}});
            if(a){onSuccess();return;}
          }catch(e){}
        } else {
          try{
            const ch=new Uint8Array(32);crypto.getRandomValues(ch);
            const uid=new TextEncoder().encode(state.user?.name||"user");
            const c=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"AGA Tasks",id:location.hostname},user:{id:uid,name:state.user?.name,displayName:state.user?.name},pubKeyCredParams:[{type:"public-key",alg:-7}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},timeout:30000}});
            if(c){
              const emp2=state.employees.find(e=>e.name===state.user?.name);
              if(emp2){emp2.credentialId=bufferToB64(c.rawId);if(window.fbUpdateEmp)window.fbUpdateEmp(emp2.code,{credentialId:emp2.credentialId});}
              onSuccess();return;
            }
          }catch(e){}
        }
      }
    }catch(e){}
  }
  showPinDialog(onSuccess);
}

function b64ToBuffer(b){const bin=atob(b);const buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;}
function bufferToB64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)));}

function showPinDialog(onSuccess){
  state.pinTarget=onSuccess;
  state.pinInput="";
  const emp=state.employees.find(e=>e.name===state.user?.name);
  state.pinMode=emp?.pin?"verify":"set";
  document.getElementById("pinTitle").textContent=state.pinMode==="set"?"Set Attendance PIN":"Enter Your PIN";
  document.getElementById("pinSub").textContent=state.pinMode==="set"?"Choose a 4-digit PIN":"Enter your 4-digit PIN";
  document.getElementById("pinError").textContent="";
  updatePinDots();
  document.getElementById("pinOverlay").classList.add("open");
}

function closePinDialog(){document.getElementById("pinOverlay").classList.remove("open");state.pinInput="";}

function pinKey(val){
  if(val==="del") state.pinInput=state.pinInput.slice(0,-1);
  else if(state.pinInput.length<4) state.pinInput+=val;
  updatePinDots();
  if(state.pinInput.length===4) setTimeout(submitPin,200);
}

function updatePinDots(){
  const dots=document.getElementById("pinDots");
  if(dots) dots.innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot ${i<state.pinInput.length?"filled":""}"></div>`).join("");
}

function submitPin(){
  const emp=state.employees.find(e=>e.name===state.user?.name);
  if(state.pinMode==="set"){
    if(emp){emp.pin=state.pinInput;if(window.fbUpdateEmp)window.fbUpdateEmp(emp.code,{pin:emp.pin});}
    closePinDialog();
    if(state.pinTarget) state.pinTarget();
  } else {
    if(state.pinInput===emp?.pin){closePinDialog();if(state.pinTarget)state.pinTarget();}
    else{state.pinInput="";updatePinDots();document.getElementById("pinError").textContent="❌ Wrong PIN. Try again.";}
  }
}

// ═══ GPS ═══
let _gpsOn=false;
function initGPS(){
  if(_gpsOn||!navigator.geolocation) return;
  _gpsOn=true;
  navigator.geolocation.watchPosition(
    p=>{state.lastLat=p.coords.latitude;state.lastLng=p.coords.longitude;},
    ()=>{_gpsOn=false;},
    {enableHighAccuracy:true,timeout:20000,maximumAge:60000}
  );
}
// Start GPS silently on load
initGPS();

// ═══ INIT ═══
render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
