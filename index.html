<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AGA Tasks - Master</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --card: #151923; --border: #1e2533;
            --accent-blue: #5c7cfa; --accent-green: #10b981;
            --high: #ff4d4d; --medium: #f39c12; --pending: #e67e22;
            --text-main: #ffffff; --text-dim: #717b91;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text-main); min-height: 100vh; }
        .phone-frame { width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; }

        /* LOGO & BRANDING */
        .logo-box { width: 100px; height: 100px; background: #000; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .brand-name { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 5px; text-transform: uppercase; text-align: center; }
        .app-title { font-size: 16px; color: var(--text-dim); margin-bottom: 40px; text-align: center; }

        /* SCREENS */
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* FORMS & BUTTONS */
        .f-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: white; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-emp { background: var(--accent-green); color: #000; }
        .btn-partner { background: var(--accent-blue); color: white; }

        /* DASHBOARD LAYOUT */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .action-btn { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; cursor: pointer; border-bottom: 2px solid var(--accent-blue); }
        .action-btn label { font-size: 11px; font-weight: 700; color: #cbd5e1; cursor: pointer; }

        /* ATTENDANCE CARD */
        .attendance-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .att-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .
