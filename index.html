<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0d16"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<title>AGA Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════
   THEME VARIABLES
═══════════════════════════════════════ */
:root {
  --bg: #0a0d16;
  --surface: #111827;
  --card: #1a2235;
  --card2: #1e2a3a;
  --border: #2a3550;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --cyan: #06b6d4;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --badge-high-bg: rgba(239,68,68,0.15);
  --badge-high: #ef4444;
  --badge-med-bg: rgba(245,158,11,0.15);
  --badge-med: #f59e0b;
  --badge-low-bg: rgba(16,185,129,0.15);
  --badge-low: #10b981;
}
:root.light {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --card: #e8edf5;
  --card2: #dde3ef;
  --border: #cbd5e1;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: "Inter", sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ═══ LAYOUT ═══ */
#app {
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  background: var(--bg);
}

/* ═══ TOPBAR ═══ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: 22px; font-weight: 800; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
}
.logout-btn {
  background: var(--red); color: #fff; border: none;
  border-radius: 10px; padding: 7px 14px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: "Inter", sans-serif;
}

/* ═══ LOGIN PAGE ═══ */
.login-page {
  min-height: 100vh; padding: 40px 24px 40px;
  display: flex; flex-direction: column; align-items: center;
}
.login-logo {
  width: 72px; height: 72px; margin-bottom: 16px;
  background: #fff; border-radius: 16px; padding: 8px;
  display: flex; align-items: center; justify-content: center;
}
.login-logo img { width: 100%; height: 100%; object-fit: contain; }
.login-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 32px; }
.login-form { width: 100%; }
.theme-toggle-row {
  display: flex; justify-content: flex-end; width: 100%; margin-bottom: 20px;
}
.theme-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px; cursor: pointer;
  font-size: 12px; color: var(--text2); font-weight: 500;
}

/* ═══ FORM ELEMENTS ═══ */
.f-group { margin-bottom: 14px; }
.f-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.f-input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px; font-size: 14px;
  color: var(--text); font-family: "Inter", sans-serif;
  -webkit-text-fill-color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.f-input:focus { border-color: var(--accent); }
.f-input::placeholder { color: var(--text3); }
.f-input:-webkit-autofill { -webkit-text-fill-color: var(--text) !important; -webkit-box-shadow: 0 0 0 1000px var(--card) inset !important; }
:root.light .f-input:-webkit-autofill { -webkit-text-fill-color: #0f172a !important; -webkit-box-shadow: 0 0 0 1000px #e8edf5 inset !important; }
select.f-input { cursor: pointer; }
select.f-input option { background: var(--card); color: var(--text); }
input[type=date].f-input { cursor: pointer; }
textarea.f-input { min-height: 80px; resize: vertical; }

/* ═══ BUTTONS ═══ */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: "Inter", sans-serif; display: flex;
  align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-yellow { background: var(--yellow); color: #fff; }
.btn-cyan { background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.4); color: var(--cyan); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text2); }
.btn-sm { padding: 8px 14px; font-size: 12px; width: auto; border-radius: 8px; }
.btn-mb { margin-bottom: 10px; }

/* ═══ CARDS ═══ */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
}
.card-dark { background: var(--card2); }

/* ═══ BADGES ═══ */
.badge {
  display: inline-flex; align-items: center; padding: 3px 9px;
  border-radius: 6px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-high { background: var(--badge-high-bg); color: var(--badge-high); }
.badge-medium { background: var(--badge-med-bg); color: var(--badge-med); }
.badge-low { background: var(--badge-low-bg); color: var(--badge-low); }
.badge-pending { background: rgba(245,158,11,0.15); color: var(--yellow); }
.badge-done { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-partner { background: rgba(99,102,241,0.15); color: var(--accent2); }
.badge-senior { background: rgba(245,158,11,0.15); color: var(--yellow); }
.badge-leave { background: rgba(6,182,212,0.15); color: var(--cyan); }

/* ═══ FILTER PILLS ═══ */
.filter-row { display: flex; gap: 8px; padding: 0 20px 14px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--text2);
  cursor: pointer; white-space: nowrap; font-family: "Inter", sans-serif;
}
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ═══ TASK CARD ═══ */
.task-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin: 0 20px 10px;
}
.task-card.from-partner { border-left: 3px solid var(--accent); }
.task-card.from-senior { border-left: 3px solid var(--yellow); }
.task-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.task-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.task-desc { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
.task-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text3); align-items: center; flex-wrap: wrap; }
.task-meta span { display: flex; align-items: center; gap: 4px; }
.task-assign { font-size: 11px; color: var(--text2); margin-top: 6px; }
.task-actions { display: flex; gap: 6px; margin-top: 10px; }
.act-btn {
  width: 32px; height: 32px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  border: 1px solid var(--border); background: var(--card2); font-size: 14px;
}

/* ═══ STATS ROW ═══ */
.stats-row { display: flex; gap: 10px; padding: 0 20px 14px; }
.stat-card {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; text-align: center;
}
.stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-num.yellow { color: var(--yellow); }
.stat-num.green { color: var(--green); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ═══ SECTION ═══ */
.section { padding: 0 20px 14px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

/* ═══ ATTENDANCE ═══ */
.att-date-select {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
}
.att-section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.att-btn-row { display: flex; gap: 10px; }
.att-in {
  flex: 1; padding: 16px; border-radius: 12px;
  background: rgba(16,185,129,0.15); border: 2px solid rgba(16,185,129,0.4);
  color: var(--green); font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: "Inter", sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.att-out {
  flex: 1; padding: 16px; border-radius: 12px;
  background: rgba(239,68,68,0.15); border: 2px solid rgba(239,68,68,0.4);
  color: var(--red); font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: "Inter", sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.att-in:disabled, .att-out:disabled { opacity: 0.4; cursor: not-allowed; }
.att-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; line-height: 1.5; }

/* ═══ OVERLAY ═══ */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.overlay-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px 22px; width: 320px;
  max-width: 90vw; text-align: center;
}
.ov-icon { font-size: 36px; margin-bottom: 10px; }
.ov-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.ov-msg { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.ov-detail {
  font-size: 12px; color: var(--text2); background: var(--card);
  border-radius: 10px; padding: 12px; margin-bottom: 16px;
  text-align: left; line-height: 1.8;
}
.ov-detail .lbl { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.ov-btns { display: flex; gap: 8px; }
.ov-no {
  flex: 1; padding: 11px; border-radius: 10px; background: var(--card);
  border: 1px solid var(--border); color: var(--text2); cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: "Inter", sans-serif;
}
.ov-yes {
  flex: 2; padding: 11px; border-radius: 10px; border: none;
  color: #fff; cursor: pointer; font-size: 13px; font-weight: 700;
  font-family: "Inter", sans-serif;
}
.ov-yes.success { background: var(--green); }
.ov-yes.danger { background: var(--red); }
.ov-yes.primary { background: var(--accent); }

/* ═══ PIN OVERLAY ═══ */
.pin-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.pin-overlay.open { opacity: 1; pointer-events: all; }
.pin-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 28px 24px; width: 300px;
  max-width: 90vw; text-align: center;
}
.pin-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.pin-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background 0.15s; }
.pin-dot.filled { background: var(--accent); }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 230px; margin: 0 auto 16px; }
.pin-key {
  padding: 16px; border-radius: 12px; background: var(--card);
  border: 1px solid var(--border); color: var(--text); font-size: 20px;
  font-weight: 700; cursor: pointer; font-family: "Inter", sans-serif;
  transition: background 0.1s;
}
.pin-key:active { background: var(--border); }
.pin-key.del { font-size: 16px; }
.pin-err { color: var(--red); font-size: 12px; min-height: 18px; margin-bottom: 8px; }
.pin-cancel { font-size: 12px; color: var(--text3); cursor: pointer; text-decoration: underline; }

/* ═══ TOAST ═══ */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 20px; font-size: 13px;
  color: var(--text); z-index: 500; opacity: 0;
  transition: all 0.3s; pointer-events: none;
  white-space: nowrap; max-width: 88vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { border-color: var(--red); color: var(--red); }
.toast.ok { border-color: var(--green); color: var(--green); }

/* ═══ LEAVE CARD ═══ */
.leave-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
}
.leave-status-pending { color: var(--yellow); font-size: 11px; font-weight: 700; }
.leave-status-approved { color: var(--green); font-size: 11px; font-weight: 700; }
.leave-status-rejected { color: var(--red); font-size: 11px; font-weight: 700; }

/* ═══ MANAGE USERS ═══ */
.user-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.user-card.pending { border-left: 3px solid var(--yellow); }
.user-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-size: 16px; font-weight: 700;
  color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 14px; font-weight: 700; color: var(--text); }
.user-meta { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.6; }
.user-actions { display: flex; flex-direction: column; gap: 6px; }

/* ═══ BACK BUTTON ═══ */
.back-row { display: flex; align-items: center; gap: 12px; padding: 16px 20px 8px; }
.back-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text2); flex-shrink: 0;
}
.page-title { font-size: 22px; font-weight: 800; color: var(--text); }
.page-sub { font-size: 12px; color: var(--text2); }

/* ═══ NOTIFICATION DOT ═══ */
.notif-dot {
  position: absolute; top: -3px; right: -3px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red); border: 2px solid var(--bg);
}
.rel { position: relative; }

/* ═══ REPORT TABLE ═══ */
.table-head {
  display: grid; grid-template-columns: 1.5fr 1fr 0.8fr 0.6fr 1.5fr;
  gap: 4px; padding: 8px 12px; font-size: 9px; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.table-row {
  display: grid; grid-template-columns: 1.5fr 1fr 0.8fr 0.6fr 1.5fr;
  gap: 4px; padding: 9px 12px; font-size: 11px; color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.table-row:last-child { border-bottom: none; }

/* ═══ OR DIVIDER ═══ */
.or-row { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
.or-line { flex: 1; height: 1px; background: var(--border); }
.or-text { font-size: 11px; color: var(--text3); font-weight: 600; }

/* ═══ INFO BOX ═══ */
.info-box {
  background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25);
  border-radius: 10px; padding: 10px 14px; font-size: 12px;
  color: var(--yellow); margin-bottom: 14px; line-height: 1.6;
}
.success-box {
  background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25);
  border-radius: 10px; padding: 10px 14px; font-size: 12px;
  color: var(--green); margin-bottom: 14px; line-height: 1.6;
}

/* ═══ PENDING BANNER ═══ */
.pending-banner {
  margin: 0 20px 14px; background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.25); border-radius: 14px;
  padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
}
.pending-banner-icon { font-size: 24px; }
.pending-banner-text { flex: 1; }
.pending-banner-title { font-size: 13px; font-weight: 700; color: var(--yellow); }
.pending-banner-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ═══ CALENDAR ═══ */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-top: 10px; }
.cal-day-name { text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); padding: 4px 0; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500;
}
.cal-day:hover { background: var(--card2); }
.cal-day.today { border: 1px solid var(--accent); color: var(--accent); font-weight: 700; }
.cal-day.selected { background: var(--accent); color: #fff; font-weight: 700; }
.cal-day.marked-in { background: rgba(16,185,129,0.2); color: var(--green); }
.cal-day.marked-out { background: rgba(239,68,68,0.2); color: var(--red); }
.cal-day.marked-both { background: rgba(16,185,129,0.3); color: var(--green); border: 1px solid var(--green); }
.cal-day.empty { cursor: default; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-nav-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; color: var(--text2); font-size: 14px; }
.cal-month { font-size: 14px; font-weight: 700; color: var(--text); }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM OVERLAY -->
<div class="overlay" id="confirmOverlay">
  <div class="overlay-box">
    <div class="ov-icon" id="ovIcon"></div>
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-msg" id="ovMsg"></div>
    <div class="ov-detail" id="ovDetail" style="display:none"></div>
    <div class="ov-btns">
      <button class="ov-no" onclick="closeConfirm()">✕ No, Cancel</button>
      <button class="ov-yes primary" id="ovYes">✓ Yes</button>
    </div>
  </div>
</div>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title" id="pinTitle">Enter PIN</div>
    <div class="pin-sub" id="pinSub">Your 4-digit attendance PIN</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pk('1')">1</button>
      <button class="pin-key" onclick="pk('2')">2</button>
      <button class="pin-key" onclick="pk('3')">3</button>
      <button class="pin-key" onclick="pk('4')">4</button>
      <button class="pin-key" onclick="pk('5')">5</button>
      <button class="pin-key" onclick="pk('6')">6</button>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,setDoc,deleteDoc,onSnapshot,query,orderBy,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyC4oF4oNzPtQNPaKQaOnnJeIFKXLNMOA9g",authDomain:"ag-task-assigner.firebaseapp.com",projectId:"ag-task-assigner",storageBucket:"ag-task-assigner.appspot.com",messagingSenderId:"694340088537",appId:"1:694340088537:web:1f14fb2bf3b62d5c7ae7bc"};
const app=initializeApp(cfg);
const db=getFirestore(app);
// Seed default employees
async function seed(){
  const defaults=[
    {code:"001",name:"Heer Patel",      email:"heer@aga.com",    mobile:"",password:"heerpatel",      approved:true,pendingApproval:false,registered:true},
    {code:"002",name:"Bhavana Shinde",  email:"bhavana@aga.com", mobile:"",password:"bhavanashinde",  approved:true,pendingApproval:false,registered:true},
    {code:"003",name:"Moksha Jain",     email:"moksha@aga.com",  mobile:"",password:"mokshajain",     approved:true,pendingApproval:false,registered:true},
    {code:"004",name:"Dhanisha Solanki",email:"dhanisha@aga.com",mobile:"",password:"dhanishasolanki",approved:true,pendingApproval:false,registered:true},
    {code:"005",name:"Prapti Padhya",   email:"prapti@aga.com",  mobile:"",password:"praptipadhya",   approved:true,pendingApproval:false,registered:true},
  ];
  for(const e of defaults) await setDoc(doc(db,"employees",e.code),e);
}
onSnapshot(collection(db,"employees"),snap=>{
  if(snap.empty){seed();return;}
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  // If any default employee missing approved field, fix them
  const needsFix=l.filter(e=>e.approved===undefined&&!e.pendingApproval);
  needsFix.forEach(async e=>{
    const fixed={...e,approved:true,pendingApproval:false};
    await setDoc(doc(db,"employees",e.code||e.id),fixed);
  });
  if(window.S){
    const fbIds=new Set(l.map(e=>e.code||e.id));
    const localOnly=S.employees.filter(e=>!fbIds.has(e.code)&&!fbIds.has(e.id));
    S.employees=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"tasks"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S) {
    const fbIds=new Set(l.map(t=>t.id));
    const localOnly=S.tasks.filter(t=>!fbIds.has(t.id));
    S.tasks=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"attendance"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S) {
    const fbIds=new Set(l.map(a=>a.id));
    const localOnly=S.attendance.filter(a=>!fbIds.has(a.id));
    S.attendance=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"leaves"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S){
    const fbIds=new Set(l.map(lv=>lv.id));
    const localOnly=S.leaves.filter(lv=>!fbIds.has(lv.id));
    const prev=S.leaves||[];
    // Notify employee if their leave just got approved
    if(S.user?.role==="employee"){
      l.forEach(lv=>{
        if(lv.empName===S.user.name&&lv.status==="approved"){
          const was=prev.find(p=>p.id===lv.id);
          if(was&&was.status!=="approved") toast("🎉 Your leave has been approved!","ok");
        }
      });
    }
    S.leaves=[...l,...localOnly];
  }
  if(window.R) R();
});
onSnapshot(query(collection(db,"notifications"),orderBy("createdAt","desc")),snap=>{
  const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));
  if(window.S) S.notifications=l;
  if(window.R) R();
});
window.FB={
  saveTask:   async t =>setDoc(doc(db,"tasks",t.id),t),
  updateTask: async(id,d)=>updateDoc(doc(db,"tasks",id),d),
  deleteTask: async id =>deleteDoc(doc(db,"tasks",id)),
  saveEmp:    async e =>setDoc(doc(db,"employees",e.code),e),
  updateEmp:  async(c,d)=>updateDoc(doc(db,"employees",c),d),
  deleteEmp:  async c =>deleteDoc(doc(db,"employees",c)),
  saveAtt:    async a =>setDoc(doc(db,"attendance",a.id),a),
  saveLeave:  async l =>setDoc(doc(db,"leaves",l.id),l),
  updateLeave:async(id,d)=>updateDoc(doc(db,"leaves",id),d),
  saveNotif:  async n =>setDoc(doc(db,"notifications",n.id),n),
};
</script>

// === PIN / BIOMETRIC ===
async function requireBiometric(onSuccess){
  if(window.PublicKeyCredential){
    try{
      const ok=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if(ok){
        const emp=S.employees.find(e=>e.name===S.user?.name);
        const ch=new Uint8Array(32); crypto.getRandomValues(ch);
        if(emp?.credentialId){
          try{
            const r=await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{type:"public-key",id:b64buf(emp.credentialId)}],userVerification:"required",timeout:30000}});
            if(r){onSuccess();return;}
          }catch(e){}
        } else {
          try{
            const uid=new TextEncoder().encode(S.user?.name||"user");
            const c=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"AGA Tasks",id:location.hostname},user:{id:uid,name:S.user?.name,displayName:S.user?.name},pubKeyCredParams:[{type:"public-key",alg:-7}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},timeout:30000}});
            if(c){
              const e2=S.employees.find(e=>e.name===S.user?.name);
              if(e2){e2.credentialId=bufb64(c.rawId);if(window.FB)FB.updateEmp(e2.code,{credentialId:e2.credentialId});}
              onSuccess(); return;
            }
          }catch(e){}
        }
      }
    }catch(e){}
  }
  showPin(onSuccess);
}
function b64buf(b){const s=atob(b);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u.buffer;}
function bufb64(b){return btoa(String.fromCharCode(...new Uint8Array(b)));}

function showPin(cb){
  S.pinCb=cb; S.pinInput="";
  const emp=S.employees.find(e=>e.name===S.user?.name);
  S.pinMode=emp?.pin?"verify":"set";
  document.getElementById("pinTitle").textContent=S.pinMode==="set"?"Set Attendance PIN":"Enter Your PIN";
  document.getElementById("pinSub").textContent=S.pinMode==="set"?"Choose a 4-digit PIN for attendance":"Enter your PIN to confirm";
  document.getElementById("pinErr").textContent="";
  updPinDots();
  document.getElementById("pinOverlay").classList.add("open");
}
function closePinOverlay(){ document.getElementById("pinOverlay").classList.remove("open"); S.pinInput=""; }
function pk(v){
  if(v==="del") S.pinInput=S.pinInput.slice(0,-1);
  else if(S.pinInput.length<4) S.pinInput+=v;
  updPinDots();
  if(S.pinInput.length===4) setTimeout(submitPin,200);
}
function updPinDots(){
  const el=document.getElementById("pinDots");
  if(el) el.innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot${i<S.pinInput.length?" filled":""}"></div>`).join("");
}
function submitPin(){
  const emp=S.employees.find(e=>e.name===S.user?.name);
  if(S.pinMode==="set"){
    if(emp){emp.pin=S.pinInput;if(window.FB)FB.updateEmp(emp.code,{pin:emp.pin});}
    closePinOverlay(); if(S.pinCb)S.pinCb();
  } else {
    if(S.pinInput===emp?.pin){closePinOverlay();if(S.pinCb)S.pinCb();}
    else{S.pinInput="";updPinDots();document.getElementById("pinErr").textContent="\u{274C} Wrong PIN. Try again.";}
  }
}

// === GPS ===
let _gpsOn=false;
function startGPS(){
  if(_gpsOn||!navigator.geolocation) return;
  _gpsOn=true;
  navigator.geolocation.getCurrentPosition(
    p=>{S.lastLat=p.coords.latitude;S.lastLng=p.coords.longitude;},
    ()=>{_gpsOn=false;},
    {enableHighAccuracy:true,timeout:20000}
  );
  navigator.geolocation.watchPosition(
    p=>{S.lastLat=p.coords.latitude;S.lastLng=p.coords.longitude;},
    ()=>{},
    {enableHighAccuracy:true,timeout:20000,maximumAge:60000}
  );
}

// === HELPERS ===
function fmtDate(d){ if(!d) return "\u{2014}"; const p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function todayStr(){ return new Date().toISOString().split("T")[0]; }
function getAttForDay(empName,date){
  return S.attendance.filter(a=>a.empName===empName&&a.date===date);
}
function pendingLeaves(){
  const all=S.leaves.filter(l=>l.status==="pending");
  if(S.user?.role==="boss"){
    // Partner only sees leave requests from senior employees (Heer & Bhavana)
    return all.filter(l=>SENIOR_EMP.includes(l.empName));
  }
  if(SENIOR_EMP.includes(S.user?.name)){
    // Seniors see leave requests from regular employees only (not other seniors)
    return all.filter(l=>!SENIOR_EMP.includes(l.empName));
  }
  return [];
}
function allLeavesForAdmin(){
  if(S.user?.role==="boss"){
    // Partner sees all leaves but can only action senior employee leaves
    return S.leaves;
  }
  if(SENIOR_EMP.includes(S.user?.name)){
    // Seniors see only non-senior leaves
    return S.leaves.filter(l=>!SENIOR_EMP.includes(l.empName));
  }
  return [];
}
function canApproveThisLeave(leave){
  if(S.user?.role==="boss") return SENIOR_EMP.includes(leave.empName);
  if(SENIOR_EMP.includes(S.user?.name)) return !SENIOR_EMP.includes(leave.empName);
  return false;
}
function myLeaves(name){
  return S.leaves.filter(l=>l.empName===name);
}
function canApproveLeave(){
  return S.user?.role==="boss" || SENIOR_EMP.includes(S.user?.name);
}

function doRegister(){
  const name=(document.getElementById("rName")?.value||"").trim();
  const mob=(document.getElementById("rMobile")?.value||"").trim();
  const email=(document.getElementById("rEmail")?.value||"").trim();

  if(!name){toast("Enter your full name","err");return;}
  if(mob.length!==10||isNaN(mob)){toast("Enter valid 10-digit mobile","err");return;}
  if(!email.includes("@")){toast("Enter valid email","err");return;}
  if(S.employees.find(e=>e.name.toLowerCase()===name.toLowerCase())){toast("Name already registered","err");return;}
  const max=S.employees.reduce((m,e)=>Math.max(m,parseInt(e.code)||0),0);
  const code=String(max+1).padStart(3,"0");
  const defPass=name.toLowerCase().replace(/\s+/g,"");
  const emp={code,name,mobile:mob,email,password:defPass,registered:true,approved:false,pendingApproval:true,registeredAt:Date.now()};
  S.employees.push(emp);

  const notif={id:"n"+Date.now(),to:"partner",type:"registration",empName:name,body:name+" has registered and awaits approval",read:false,createdAt:Date.now()};

  go("login");
}

function pgAttReport(){
  const from=S.f.rptFrom; const to=S.f.rptTo;

  const allRecs=S.attendance.filter(a=>{
    if(from&&a.date<from) return false;

  });
  // Group by empName+date
  const grouped={};
  allRecs.forEach(a=>{
    const key=a.empName+"||"+a.date;
    if(!grouped[key]) grouped[key]={empName:a.empName,date:a.date,inTime:"",outTime:"",inLoc:"",outLoc:"",inMarkedOn:"",outMarkedOn:""};
    if(a.type==="IN"){grouped[key].inTime=a.time||"";grouped[key].inLoc=a.location||"";grouped[key].inMarkedOn=a.markedOn||a.date;}
    if(a.type==="OUT"){grouped[key].outTime=a.time||"";grouped[key].outLoc=a.location||"";grouped[key].outMarkedOn=a.markedOn||a.date;}
  });
  const rows=Object.values(grouped).sort((a,b)=>b.date.localeCompare(a.date));

  // Check leave status for each row
  function getLeaveInfo(empName,date){
    const lv=S.leaves.find(l=>l.empName===empName&&l.status==="approved"&&l.from<=date&&l.to>=date);
    if(lv) return {onLeave:true,type:lv.leaveType,approvedBy:lv.approvedBy||"—"};

    <div class="back-row">

          <div>EMPLOYEE</div><div>DATE</div><div>IN</div><div>OUT</div><div>STATUS</div>

          const li=getLeaveInfo(r.empName,r.date);

            <div style="color:var(--red);">${r.outTime||"—"}</div>
            <div>${li.onLeave?`<span style="color:var(--cyan);font-size:10px;">✈️ ${li.type}</span>`:""}</div>
          </div>`;
        }).join("")
        :`<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">No records found.</div>`}

      </div>

function downloadAtt(){
  const from=S.f.rptFrom; const to=S.f.rptTo;
  const allRecs=S.attendance.filter(a=>{
    if(from&&a.date<from) return false;
    if(to&&a.date>to) return false;
    return true;
  });
  const grouped={};
  allRecs.forEach(a=>{
    const key=a.empName+"||"+a.date;
    if(!grouped[key]) grouped[key]={empName:a.empName,date:a.date,inTime:"",outTime:"",inLoc:"",outLoc:"",inMarkedOn:"",outMarkedOn:""};
    if(a.type==="IN"){grouped[key].inTime=a.time||"";grouped[key].inLoc=a.location||"";grouped[key].inMarkedOn=a.markedOn||a.date;}
    if(a.type==="OUT"){grouped[key].outTime=a.time||"";grouped[key].outLoc=a.location||"";grouped[key].outMarkedOn=a.markedOn||a.date;}
  });
  const rows=Object.values(grouped).sort((a,b)=>b.date.localeCompare(a.date));
  if(!window.XLSX){toast("Excel library not loaded","err");return;}
  const xlRows=[["Employee","Date (DD/MM/YYYY)","IN Time","OUT Time","IN Location","OUT Location","IN Marked On","OUT Marked On","Leave Status","Leave Approved By"]];
  rows.forEach(r=>{
    const li=S.leaves.find(l=>l.empName===r.empName&&l.status==="approved"&&l.from<=r.date&&l.to>=r.date);
    xlRows.push([
      r.empName,
      fmtDate(r.date),
      r.inTime||"—",
      r.outTime||"—",
      r.inLoc||"—",
      r.outLoc||"—",
      r.inMarkedOn?fmtDate(r.inMarkedOn):"—",
      r.outMarkedOn?fmtDate(r.outMarkedOn):"—",
      li?li.leaveType:"—",
      li?(li.approvedBy||"—"):"—"
    ]);
  });
  const ws=XLSX.utils.aoa_to_sheet(xlRows);
  ws["!cols"]=[{wch:20},{wch:14},{wch:10},{wch:10},{wch:22},{wch:22},{wch:14},{wch:14},{wch:14},{wch:16}];
  const wb=XLSX.utils.book_new();

  XLSX.writeFile(wb,"AGA_Attendance_"+(from||"all")+"_to_"+(to||"all")+".xlsx");
  toast("Excel downloaded \u{2705}","ok");
}

function doChangePass(){

  const nw=(document.getElementById("cpNew")?.value||"").trim();
  const conf=(document.getElementById("cpConf")?.value||"").trim();
  if(S.user?.role==="boss"){
    if(old!==S.partnerPass){toast("Current password incorrect","err");return;}
    if(nw.length<6){toast("Min 6 characters","err");return;}
    if(nw!==conf){toast("Passwords do not match","err");return;}
    S.partnerPass=nw; toast("Password updated \u{2705}","ok"); go("boss");
  } else {
    const emp=S.employees.find(e=>e.name===S.user?.name);
    if(!emp||old!==emp.password){toast("Current password incorrect","err");return;}
    if(nw.length<6){toast("Min 6 characters","err");return;}
    if(nw!==conf){toast("Passwords do not match","err");return;}
    emp.password=nw; if(window.FB)FB.updateEmp(emp.code,{password:nw});
    toast("Password updated \u{2705}","ok"); go("employee");
  }
}

  const directTasks=S.tasks.filter(t=>t.assignedTo===name&&!t.reassignedTo);
  // Tasks I reassigned to someone
  const reassignedByMe=S.tasks.filter(t=>t.assignedTo===name&&t.reassignedTo);
  // Tasks reassigned TO me by a senior
  const reassignedToMe=S.tasks.filter(t=>t.reassignedTo===name);

  // PENDING buckets
  const pendDirect=directTasks.filter(t=>t.status==="pending");
  const pendReassignedToMe=reassignedToMe.filter(t=>!t.reassigneeCompleted);
  const pendNeedsMyApproval=reassignedByMe.filter(t=>t.status==="pending"&&t.reassigneeCompleted);
  const waitingOnAssignee=reassignedByMe.filter(t=>t.status==="pending"&&!t.reassigneeCompleted);

  // DONE buckets
  const doneDirect=directTasks.filter(t=>t.status==="completed");
  const doneReassignedToMe=reassignedToMe.filter(t=>t.reassigneeCompleted);
  const doneReassignedByMe=reassignedByMe.filter(t=>t.status==="completed");

  const totalPend=pendDirect.length+pendReassignedToMe.length+pendNeedsMyApproval.length+waitingOnAssignee.length;
  const totalDone=doneDirect.length+doneReassignedToMe.length+doneReassignedByMe.length;

  // Tasks due today
  const allMyPending=[...pendDirect,...pendReassignedToMe,...pendNeedsMyApproval,...waitingOnAssignee];
  const dueToday=allMyPending.filter(t=>t.due===today);

  // Check if on approved leave today
  const onLeaveToday=S.leaves.find(l=>l.empName===name&&l.status==="approved"&&l.from<=today&&l.to>=today);

  const myPendLeaves=myLeaves(name).filter(l=>l.status==="pending").length;
  const canApprove=canApproveLeave();
  const pendLeaveCount=canApprove?pendingLeaves().length:0;

  function buildTaskCard(t,type){
    const byPartner=!t.assignedBy||t.assignedBy==="Partner"||t.assignedBy==="Chintan";
    const bySenior=SENIOR_EMP.includes(t.assignedBy||"");
    const cls=type==="reassignedToMe"?"from-senior":byPartner?"from-partner":bySenior?"from-senior":"";

    let badge="";
    if(type==="reassignedToMe") badge=`<span class="badge badge-senior">↪️ From ${t.assignedTo}</span>`;
    else if(byPartner) badge=`<span class="badge badge-partner">🔵 From Partner</span>`;
    else if(bySenior) badge=`<span class="badge badge-senior">🟡 From ${t.assignedBy}</span>`;

    let actionHtml="";
    if(type==="direct"){
      actionHtml=`<div class="task-actions">
        <button class="btn btn-green" style="flex:2;padding:10px;" onclick="empComplete('${t.id}')">✅ Mark Complete</button>
        ${isSenior?`<button class="btn btn-yellow" style="flex:1;padding:10px;" onclick="openReassign('${t.id}')">↪️</button>`:""}
      </div>`;
    } else if(type==="reassignedToMe"){
      actionHtml=`<div class="task-actions">
        <button class="btn btn-green" style="width:100%;padding:10px;" onclick="empCompleteAsReassignee('${t.id}')">✅ Mark Complete</button>
      </div>`;
    } else if(type==="needsMyApproval"){
      actionHtml=`<div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--green);">✅ Completed by ${t.reassignedTo}</div>
      <div class="task-actions">
        <button class="btn btn-green" style="width:100%;padding:10px;" onclick="empComplete('${t.id}')">✅ Mark Complete</button>
      </div>`;
    } else if(type==="waiting"){
      actionHtml=`<div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--yellow);">⏳ Reassigned to ${t.reassignedTo} · Waiting</div>`;
    }

    return `<div class="task-card ${cls}">
      ${badge?`<div style="margin-bottom:6px;">${badge}</div>`:""}
      <div class="task-top">
        <span class="badge badge-${t.priority}">${t.priority.toUpperCase()}</span>
        <span class="badge badge-pending" style="margin-left:auto;">${type==="needsMyApproval"?"Assignee Done":type==="waiting"?"Reassigned":"Pending"}</span>
      </div>
      <div class="task-title">${t.client}</div>
      <div class="task-desc">${(t.desc||"").substring(0,80)}</div>
      <div class="task-meta"><span>📅 ${t.due}</span><span>📁 ${t.category}</span></div>
      ${actionHtml}
    </div>`;
  }

  const allDone=[...doneDirect,...doneReassignedToMe,...doneReassignedByMe];

  return `<div>
    <div class="topbar">
      <div>
        <div class="topbar-title">Hello, ${name} 👋</div>
        <div class="topbar-sub">Employee Dashboard</div>
      </div>
      <div class="topbar-right">
        ${canApprove&&pendLeaveCount?`<div class="rel icon-btn" onclick="go('leaveAdmin')">✈️<div class="notif-dot"></div></div>`:""}
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;padding:0 20px 10px;">
      <div onclick="S.empFilter=S.empFilter==='pending'?'all':'pending';R()" style="flex:1;background:var(--card);border:1px solid ${S.empFilter==='pending'?'var(--yellow)':'var(--border)'};border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;">
        <div style="font-size:18px;font-weight:800;color:var(--yellow);">${totalPend}</div>
        <div style="font-size:11px;color:var(--text2);">Pending</div>
      </div>
      <div onclick="S.empFilter=S.empFilter==='completed'?'all':'completed';R()" style="flex:1;background:var(--card);border:1px solid ${S.empFilter==='completed'?'var(--green)':'var(--border)'};border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;">
        <div style="font-size:18px;font-weight:800;color:var(--green);">${totalDone}</div>
        <div style="font-size:11px;color:var(--text2);">Completed</div>
      </div>
    </div>

    <div style="padding:0 20px 10px;">
      <div onclick="document.getElementById('dueTodaySec')?.scrollIntoView({behavior:'smooth'})" style="background:${dueToday.length?"rgba(239,68,68,0.1)":"rgba(16,185,129,0.08)"};border:1px solid ${dueToday.length?"rgba(239,68,68,0.3)":"rgba(16,185,129,0.25)"};border-radius:12px;padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;">
        <div style="font-size:24px;">📅</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:800;color:${dueToday.length?"var(--red)":"var(--green)"};">${dueToday.length?dueToday.length+" Task"+(dueToday.length>1?"s":"")+" Due Today":"No Tasks Due Today"}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${dueToday.length?"Tap to view":"You're all caught up 🎉"}</div>
        </div>
        ${dueToday.length?`<div style="font-size:22px;font-weight:800;color:var(--red);">${dueToday.length}</div>`:""}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px 10px;">
      <button class="btn btn-green" style="padding:10px;font-size:12px;" onclick="go('markAtt')">📍 Attendance</button>
      <button class="btn btn-cyan" style="padding:10px;font-size:12px;" onclick="go('applyLeave')">✈️ Apply Leave${myPendLeaves?" ("+myPendLeaves+")":""}</button>
      <button class="btn btn-ghost" style="padding:10px;font-size:12px;" onclick="go('myLeaves')">📋 My Leaves</button>
      ${canApprove?`<button class="btn btn-outline" style="padding:10px;font-size:12px;" onclick="go('leaveAdmin')">👥 Approve Leave${pendLeaveCount?" ("+pendLeaveCount+")":""}</button>`:`<button class="btn btn-yellow" style="padding:10px;font-size:12px;" onclick="go('changePass')">🔑 Password</button>`}
      ${canApprove?`<button class="btn btn-yellow" style="padding:10px;font-size:12px;" onclick="go('changePass')">🔑 Password</button>`:``}
    </div>

    ${onLeaveToday?`<div style="margin:0 20px 10px;background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--cyan);">✈️ You are on approved leave today (${onLeaveToday.leaveType})${onLeaveToday.approvedBy?" · Approved by "+onLeaveToday.approvedBy:""}</div>`:""}

    ${S.empFilter==="pending"?`
    <div style="padding:0 20px;font-size:11px;color:var(--yellow);font-weight:700;letter-spacing:1px;margin-bottom:8px;">PENDING TASKS (${totalPend})</div>
    ${allMyPending.length?allMyPending.map(t=>`<div class="task-card" style="padding:10px 14px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge badge-${t.priority}" style="font-size:9px;">${t.priority.toUpperCase()}</span>
        <div style="flex:1;font-size:13px;font-weight:600;color:var(--text);">${t.client} <span style="color:var(--text3);">–</span> <span style="font-weight:400;color:var(--text2);">${(t.desc||"").substring(0,40)}${(t.desc||"").length>40?"…":""}</span></div>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--text3);margin-top:4px;">
        <span>📁 ${t.category||"—"}</span><span>📅 ${t.due||"—"}</span>${t.reassignedTo?`<span>↪️ ${t.reassignedTo}</span>`:""}
      </div>
    </div>`).join(""):`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px;">No pending tasks 🎉</div>`}`

    :S.empFilter==="completed"?`
    <div style="padding:0 20px;font-size:11px;color:var(--green);font-weight:700;letter-spacing:1px;margin-bottom:8px;">COMPLETED TASKS (${totalDone})</div>
    ${allDone.length?allDone.map(t=>`<div class="task-card" style="padding:10px 14px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge badge-${t.priority}" style="font-size:9px;">${t.priority.toUpperCase()}</span>
        <div style="flex:1;font-size:13px;font-weight:600;color:var(--text);">${t.client} <span style="color:var(--text3);">–</span> <span style="font-weight:400;color:var(--text2);">${(t.desc||"").substring(0,40)}${(t.desc||"").length>40?"…":""}</span></div>
        <span style="font-size:10px;color:var(--green);">✅</span>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--text3);margin-top:4px;">
        <span>📁 ${t.category||"—"}</span><span>📅 ${t.due||"—"}</span>${t.reassignedTo?`<span>↪️ ${t.reassignedTo}</span>`:""}
      </div>
    </div>`).join(""):`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px;">No completed tasks yet</div>`}`

    :`
    ${dueToday.length?`
    <div id="dueTodaySec" style="padding:0 20px;font-size:11px;color:var(--yellow);font-weight:700;letter-spacing:1px;margin-bottom:8px;">📅 DUE TODAY (${dueToday.length})</div>
    ${dueToday.map(t=>{
      const type=pendDirect.includes(t)?"direct":pendReassignedToMe.includes(t)?"reassignedToMe":pendNeedsMyApproval.includes(t)?"needsMyApproval":"waiting";
      return buildTaskCard(t,type);
    }).join("")}`:""}

    ${allMyPending.filter(t=>t.due!==today).length?`
    <div style="padding:0 20px;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:8px;">ALL PENDING TASKS</div>
    ${(()=>{let cards="";
      pendNeedsMyApproval.filter(t=>t.due!==today).forEach(t=>cards+=buildTaskCard(t,"needsMyApproval"));
      pendDirect.filter(t=>t.due!==today).forEach(t=>cards+=buildTaskCard(t,"direct"));
      pendReassignedToMe.filter(t=>t.due!==today).forEach(t=>cards+=buildTaskCard(t,"reassignedToMe"));
      waitingOnAssignee.filter(t=>t.due!==today).forEach(t=>cards+=buildTaskCard(t,"waiting"));
      return cards;
    })()}`
    :!dueToday.length?`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px;">No pending tasks 🎉</div>`:""}

    ${allDone.length?`
    <div style="padding:0 20px;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:6px;">COMPLETED</div>
    ${allDone.map(t=>`<div class="task-card" style="opacity:0.5;padding:8px 14px;margin:0 20px 6px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="badge badge-${t.priority}" style="font-size:8px;padding:2px 6px;">${t.priority.toUpperCase()}</span>
        <span style="font-size:12px;font-weight:600;color:var(--text);">${t.client}</span>
        <span style="font-size:10px;color:var(--green);margin-left:auto;">✅</span>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">${t.category||""} · ${t.due||""}${t.reassignedTo?" · ↪️ "+t.reassignedTo:""}</div>
    </div>`).join("")}`:""}`}

    <div style="padding:10px 20px;">
      <button class="btn btn-red" style="padding:10px;font-size:12px;" onclick="doLogout()">Logout</button>
    </div>
    <div style="height:16px;"></div>
  </div>`;
}

function empComplete(id){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  confirm2({icon:"\u{2705}",title:"Mark Complete?",msg:`Mark "${t.client}" as done?`,
    yesLabel:"\u{2705} Yes",yesType:"success",
    onYes:()=>{
      t.status="completed";if(window.FB)FB.updateTask(id,{status:"completed"});
      const notif={id:"n"+Date.now(),to:"partner",type:"taskDone",empName:S.user?.name,body:(S.user?.name||"")+" completed: "+t.client,read:false,createdAt:Date.now()};
      S.notifications.push(notif);if(window.FB)FB.saveNotif(notif);
      toast("Task completed \u{2705}","ok");R();
    }});
}

function empCompleteAsReassignee(id){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  confirm2({icon:"\u{2705}",title:"Mark Complete?",msg:`Mark "${t.client}" as done? This will notify ${t.assignedTo}.`,
    yesLabel:"\u{2705} Yes",yesType:"success",
    onYes:()=>{
      t.reassigneeCompleted=true;
      if(window.FB)FB.updateTask(id,{reassigneeCompleted:true});
      const notif={id:"n"+Date.now(),to:"partner",type:"taskDone",empName:S.user?.name,body:(S.user?.name||"")+" completed (reassigned): "+t.client,read:false,createdAt:Date.now()};
      S.notifications.push(notif);if(window.FB)FB.saveNotif(notif);
      toast("Task completed! "+t.assignedTo+" will be notified \u{2705}","ok");R();
    }});
}

function openReassign(id){
  S.reassignId=id; S.f.assignedTo="";
  const approved=S.employees.filter(e=>e.approved!==false&&!SENIOR_EMP.includes(e.name));
  const opts=approved.map(e=>`<option value="${e.name}">${e.name}</option>`).join("");
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  confirm2({icon:"\u{21AA}\u{FE0F}",title:"Reassign Task",msg:`Reassign "${t.client}" to:`,
    detail:`<select class="f-input" id="reassignSel" style="margin-top:8px;"><option value="">— Select Employee —</option>${opts}</select>`,
    yesLabel:"\u{21AA}\u{FE0F} Reassign",yesType:"primary",
    onYes:()=>{
      const to=document.getElementById("reassignSel")?.value;
      if(!to){toast("Select an employee","err");return;}
      t.reassignedTo=to;
      t.reassignedBy=S.user?.name;
      t.reassigneeCompleted=false;
      if(window.FB) FB.updateTask(t.id,{reassignedTo:to,reassignedBy:t.reassignedBy,reassigneeCompleted:false});
      toast("Reassigned to "+to+" \u{2705}","ok"); R();
    }
  });
}

function pgMarkAtt(){
  const name=S.user?.name||"";
  const selDate=S.f.attDate||todayStr();
  const dayRecs=getAttForDay(name,selDate);
  const hasIn=dayRecs.some(a=>a.type==="IN");
  const hasOut=dayRecs.some(a=>a.type==="OUT");
  const inRec=dayRecs.find(a=>a.type==="IN");
  const outRec=dayRecs.find(a=>a.type==="OUT");
  // Build calendar
  const cal=buildAttCal(name);

  return `<div style="padding:0 0 40px;">
    <div class="back-row">
      <div class="back-btn" onclick="go('employee')">←</div>
      <div>
        <div class="page-title">Mark Attendance</div>
        <div class="page-sub">${name}</div>
      </div>
    </div>
    <div class="section">
      <div class="card">
        <div class="att-section-title">📅 Select Date</div>
        ${cal}
      </div>
      <div style="height:14px;"></div>
      <div class="card">
        <div class="att-section-title">Mark Your Status</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">Selected: <strong>${fmtDate(selDate)}</strong></div>
        ${hasIn?`<div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--green);">✅ IN marked at ${inRec?.time||"\u{2014}"} · ${inRec?.location||"location not captured"}</div>`:""}
        ${hasOut?`<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--red);">🔴 OUT marked at ${outRec?.time||"\u{2014}"} · ${outRec?.location||""}</div>`:""}
        <div class="att-btn-row">
          <button class="att-in" onclick="doMarkAtt('IN')" ${hasIn?"disabled":""}>☑️ IN</button>
          <button class="att-out" onclick="doMarkAtt('OUT')" ${hasOut?"disabled":""}>🔴 OUT</button>
        </div>
        <div class="att-hint">Your location will be captured automatically.<br/>Biometric or PIN required to confirm.</div>
      </div>
    </div>
  </div>`;
}

function buildAttCal(empName){
  const y=S.f.attCalY; const m=S.f.attCalM;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=todayStr();
  const dayNames=DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join("");
  let cells=Array(first).fill(`<div class="cal-day empty"></div>`);
  for(let d=1;d<=days;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const recs=getAttForDay(empName,dateStr);
    const hasIn=recs.some(a=>a.type==="IN");
    const hasOut=recs.some(a=>a.type==="OUT");
    const sel=dateStr===S.f.attDate;
    const isToday=dateStr===today;
    const isFuture=dateStr>today;
    let cls="cal-day";
    if(isFuture) cls+=" empty";
    else if(sel) cls+=" selected";
    else if(hasIn&&hasOut) cls+=" marked-both";
    else if(hasIn) cls+=" marked-in";
    else if(hasOut) cls+=" marked-out";
    else if(isToday) cls+=" today";
    if(isFuture){
      cells.push(`<div class="${cls}" style="opacity:0.3;cursor:not-allowed;">${d}</div>`);
    } else {
      cells.push(`<div class="${cls}" onclick="S.f.attDate='${dateStr}';R()">${d}</div>`);
    }
  }
  return `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="if(S.f.attCalM===0){S.f.attCalM=11;S.f.attCalY--;}else S.f.attCalM--;R()">‹</button>
    <div class="cal-month">${MONTHS[m]} ${y}</div>
    <button class="cal-nav-btn" onclick="if(S.f.attCalM===11){S.f.attCalM=0;S.f.attCalY++;}else S.f.attCalM++;R()">›</button>
  </div>
  <div class="cal-grid">${dayNames}${cells.join("")}</div>`;
}

function doMarkAtt(type){
  const name=S.user?.name; const date=S.f.attDate||todayStr();
  const today=todayStr();
  if(date>today){toast("Cannot mark attendance for future dates","err");return;}
  const recs=getAttForDay(name,date);
  if(type==="IN"&&recs.some(a=>a.type==="IN")){toast("Already marked IN for this date","err");return;}
  if(type==="OUT"&&recs.some(a=>a.type==="OUT")){toast("Already marked OUT for this date","err");return;}
  if(type==="OUT"&&!recs.some(a=>a.type==="IN")){toast("Please mark IN first","err");return;}
  requireBiometric(()=>{
    const now=new Date();
    const time=now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});
    const markedOn=todayStr();
    const rec={id:"att"+Date.now(),empName:name,type,date,time,markedOn,
      lat:S.lastLat,lng:S.lastLng,
      location:S.lastLat?S.lastLat.toFixed(4)+", "+S.lastLng.toFixed(4):"unknown",
      createdAt:Date.now()};
    if(S.lastLat){
      fetch("https://nominatim.openstreetmap.org/reverse?lat="+S.lastLat+"&lon="+S.lastLng+"&format=json")
        .then(r=>r.json()).then(d=>{
          const a=d.address;
          rec.location=[a.road||a.pedestrian,a.suburb||a.neighbourhood||a.village||a.town||a.city].filter(Boolean).slice(0,2).join(", ")||rec.location;
          if(window.FB) FB.saveAtt(rec);
        }).catch(()=>{if(window.FB) FB.saveAtt(rec);});
    } else {
      if(window.FB) FB.saveAtt(rec);
    }
    S.attendance.push(rec);
    // Notify partner
    const notif={id:"n"+Date.now(),to:"partner",type:"attendance",empName:name,body:name+" marked "+type+" at "+time+(date!==markedOn?" (for "+fmtDate(date)+")":""),read:false,createdAt:Date.now()};
    S.notifications.push(notif);
    if(window.FB) FB.saveNotif(notif);
    toast(`${type} marked at ${time} ✅`,"ok");
    R();
  });
}

        <input class="f-input" type="date" value="${S.f.leaveFrom}" onchange="S.f.leaveFrom=this.value"/>
      </div>
      <div class="f-group"><div class="f-label">To Date</div>
        <input class="f-input" type="date" value="${S.f.leaveTo}" onchange="S.f.leaveTo=this.value"/>
      </div>
      <div class="f-group"><div class="f-label">Reason (Optional)</div>
        <textarea class="f-input" placeholder="Reason for leave..." oninput="S.f.leaveReason=this.value">${S.f.leaveReason}</textarea>
      </div>
      <button class="btn btn-accent" onclick="submitLeave()">✈️ Apply Leave</button>
    </div>
  </div>`;
}

function submitLeave(){
  const from=S.f.leaveFrom; const to=S.f.leaveTo;
  if(!from){toast("Select from date","err");return;}
  if(!to){toast("Select to date","err");return;}
  if(from>to){toast("From date must be before to date","err");return;}
  confirm2({icon:"✈️",title:"Are You Sure?",msg:`Apply ${S.f.leaveType} from ${fmtDate(from)} to ${fmtDate(to)}?`,
    detail:`<div class="lbl">Type</div>${S.f.leaveType}<div class="lbl">Duration</div>${fmtDate(from)} → ${fmtDate(to)}<div class="lbl">Reason</div>${S.f.leaveReason||"Not specified"}`,
    yesLabel:"\u{2705} Yes, Apply",yesType:"success",
    onYes:()=>{
      const l={id:"lv"+Date.now(),empName:S.user?.name,leaveType:S.f.leaveType,
        from,to,reason:S.f.leaveReason,status:"pending",createdAt:Date.now()};
      S.leaves.push(l);
      if(window.FB) FB.saveLeave(l);
      // Notify partner for senior leaves
      if(SENIOR_EMP.includes(S.user?.name)){
        const notif={id:"n"+Date.now(),to:"partner",type:"leaveRequest",empName:S.user?.name,body:(S.user?.name||"")+" applied for "+S.f.leaveType+" ("+fmtDate(from)+" → "+fmtDate(to)+")",read:false,createdAt:Date.now()};
        S.notifications.push(notif);if(window.FB)FB.saveNotif(notif);
      }
      S.f.leaveFrom=""; S.f.leaveTo=""; S.f.leaveReason="";
      toast("Leave applied! Awaiting approval.","ok");
      go("employee");
    }
  });
}

// ── MY LEAVES ──
function pgMyLeaves(){
  const name=S.user?.name;
  const leaves=myLeaves(name);
  return `<div style="padding:0 0 40px;">
    <div class="back-row">
      <div class="back-btn" onclick="go('employee')">←</div>
      <div><div class="page-title">My Leaves</div></div>
    </div>
    <div class="section">
      ${leaves.length?leaves.map(l=>`
        <div class="leave-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span class="badge badge-leave">${l.leaveType}</span>
            <div class="leave-status-${l.status}">${l.status==="pending"?"\u{23F3} Pending":l.status==="approved"?"\u{2705} Approved":"\u{2715} Rejected"}</div>
          </div>
          <div style="font-size:13px;font-weight:600;margin-bottom:4px;">📅 ${fmtDate(l.from)} → ${fmtDate(l.to)}</div>
          <div style="font-size:12px;color:var(--text3);">${l.reason||"No reason provided"}</div>
          ${l.status==="approved"?`<div style="font-size:11px;color:var(--green);margin-top:6px;">Approved by ${l.approvedBy||"—"}</div>`:""}
        </div>`).join("")
        :`<div style="text-align:center;padding:30px;color:var(--text3);">No leave applications</div>`}
    </div>
  </div>`;
}

// Senior employee leave approval
function buildSeniorLeaveApproval(){
  const pLeaves=pendingLeaves();
  if(!pLeaves.length) return "";
  return `<div class="section">
    <div class="section-title" style="color:var(--cyan);">✈️ Pending Leaves (${pLeaves.length})</div>
    ${pLeaves.map(l=>`
      <div class="leave-card">
        <div style="font-size:14px;font-weight:700;margin-bottom:6px;">${l.empName}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">📅 ${fmtDate(l.from)} → ${fmtDate(l.to)} · ${l.leaveType}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-green btn-sm" onclick="confirmApproveLeave('${l.id}','${l.empName}')">✅ Approve</button>
          <button class="btn btn-red btn-sm" onclick="confirmRejectLeave('${l.id}','${l.empName}')">✕ Reject</button>
        </div>
      </div>`).join("")}
  </div>`;
}
