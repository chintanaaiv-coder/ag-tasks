<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGA Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --card: #151923; --border: #1e2533;
            --accent-blue: #5c7cfa; --accent-green: #10b981;
            --high: #ff4d4d; --text-main: #ffffff; --text-dim: #717b91;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); }
        .app { width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; }
        
        /* THE FIX: Use display block/none directly */
        .screen { display: none; }
        
        .logo { width: 80px; height: 80px; background: #000; margin: 0 auto 20px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .brand { font-family: 'Syne'; font-size: 28px; text-align: center; text-transform: uppercase; margin-bottom: 30px; }
        .input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #fff; margin-bottom: 15px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 10px; display: block; }
        
        /* DASHBOARD ELEMENTS */
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; z-index: 99; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #000; border-radius: 8px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="app">
        <div id="screen1" style="display: block;">
            <div class="logo"><svg viewBox="0 0 100 100" width="40"><path d="M20 85 L50 15 L80 85 M35 60 L65 60" stroke="white" stroke-width="10" fill="none"/></svg></div>
            <h1 class="brand">Acharya<br>Gehlot &<br>Associates</h1>
            <input type="text" class="input" placeholder="Employee Name">
            <input type="password" class="input" placeholder="Password">
            <button class="btn" style="background:var(--accent-green);">Employee Login</button>
            <p style="text-align:center; color:var(--text-dim); margin:10px;">OR</p>
            <button class="btn" style="background:var(--accent-blue); color:#fff;" onclick="goToScreen2()">Login as Partner</button>
        </div>

        <div id="screen2" class="screen">
            <h1 class="brand">Partner Login</h1>
            <p style="text-align:center; margin-bottom:20px;">chintan@acharyagehlot.com</p>
            <input type="password" id="pass" class="input" placeholder="Enter Password">
            <button class="btn" style="background:var(--accent-blue); color:#fff;" onclick="checkAccess()">Sign In</button>
            <button class="btn" style="background:none; color:var(--text-dim);" onclick="goToScreen1()">← Back</button>
        </div>

        <div id="screen3" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Hello, Chintan</h2>
                <button onclick="location.reload()" style="background:var(--high); color:#fff; border:none; padding:5px 10px; border-radius:5px;">Logout</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <button class="btn" style="background:var(--card); color:#fff; border:1px solid var(--border);" onclick="openM('mTeam')">Manage Team</button>
                <button class="btn" style="background:var(--card); color:#fff; border:1px solid var(--border);" onclick="openM('mAnal')">Task Analysis</button>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <b style="color:var(--accent-green)">Attendance</b>
                    <span style="color:var(--accent-blue); font-size:12px; cursor:pointer;" onclick="openM('mExp')">Export Excel</span>
                </div>
                <p style="font-size:12px; color:var(--text-dim); margin-top:10px;">No employees active.</p>
            </div>
        </div>
    </div>

    <div id="mExp" class="modal">
        <div style="background:var(--card); padding:20px; border-radius:20px; margin-top:50px;">
            <h3>Export Attendance</h3>
            <input type="date" class="input" style="margin-top:10px;">
            <input type="date" class="input">
            <button class="btn" style="background:var(--accent-green);" onclick="alert('Downloading...'); closeM()">Download CSV</button>
            <button class="btn" onclick="closeM()">Cancel</button>
        </div>
    </div>

    <div id="mTeam" class="modal">
        <div style="background:var(--card); padding:20px; border-radius:20px; margin-top:50px;">
            <h3>Manage Team</h3>
            <p style="font-size:12px; color:var(--text-dim); margin:10px 0;">PENDING:</p>
            <div class="row" id="req1">
                <span>new.staff@aga.com</span>
                <button onclick="confirm('Approve?') && (document.getElementById('req1').innerHTML='Approved')" style="color:var(--accent-green); background:none; border:none; font-weight:700;">APPROVE</button>
            </div>
            <p style="font-size:12px; color:var(--text-dim); margin:10px 0;">ACTIVE:</p>
            <div class="row" id="staff1">
                <span>Heer Patel</span>
                <button onclick="confirm('Delete?') && document.getElementById('staff1').remove()" style="color:var(--high); background:none; border:none; font-size:20px;">×</button>
            </div>
            <button class="btn" style="margin-top:20px;" onclick="closeM()">Close</button>
        </div>
    </div>

    <script>
        // Use direct element ID access - most stable way
        function goToScreen2() {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'block';
        }
        function goToScreen1() {
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('screen1').style.display = 'block';
        }
        function checkAccess() {
            var p = document.getElementById('pass').value;
            if(p === "Partner@AG2026") {
                document.getElementById('screen2').style.display = 'none';
                document.getElementById('screen3').style.display = 'block';
            } else {
                alert("Wrong Password");
            }
        }
        function openM(id) { document.getElementById(id).style.display = 'block'; }
        function closeM() { 
            document.getElementById('mExp').style.display = 'none';
            document.getElementById('mTeam').style.display = 'none';
        }
    </script>
</body>
</html>
