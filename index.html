<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AGA Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --input-bg: #e8f0fe;
            --accent-green: #10b981;
            --accent-blue: #6366f1;
            --text-dim: #717b91;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-frame {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }

        /* LOGO AREA */
        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* AG Logo using SVG for perfect replication */
        .ag-logo { width: 80px; height: 80px; }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .sub-title {
            font-size: 15px;
            color: var(--text-dim);
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* LOGIN FORM */
        .login-section { text-align: left; margin-top: 20px; }
        
        .login-header {
            font-size: 11px;
            font-weight: 700;
            color: #3b4252;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 10px;
            padding: 14px 16px;
            color: #1e293b;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 15px;
            outline: none;
        }

        .forgot-link {
            text-align: right;
            font-size: 12px;
            color: #3b82f6;
            margin-top: -5px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-emp {
            background: var(--accent-green);
            color: #fff;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .btn-partner {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .reg-text {
            font-size: 12px;
            color: var(--text-dim);
            margin: 15px 0 25px;
        }
        .reg-link { color: #3b82f6; cursor: pointer; }

        /* DIVIDER */
        .divider-container {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .line { flex: 1; height: 1px; background: #1e2533; }
        .or-text { padding: 0 10px; color: var(--text-dim); font-size: 12px; font-weight: 600; }

        /* NAVIGATION CONTROL */
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div id="cover" class="screen active">
            <div class="logo-container">
                <svg class="ag-logo" viewBox="0 0 100 100">
                    <path d="M50 15 L20 85 L35 85 L42.5 65 L65 65 L70 85 L85 85 Z M46 55 L50 40 L54 55 Z" fill="white"/>
                    <path d="M60 70 L90 70 L90 85 L60 85 Z" fill="white"/>
                </svg>
            </div>
            
            <h1 class="brand-name">Acharya<br>Gehlot &<br>Associates</h1>
            <p class="sub-title">Task Assigner</p>

            <div class="login-section">
                <span class="login-header">Employee Login</span>
                
                <label class="label">Your Name</label>
                <input type="text" class="input-field" value="Heer patel">

                <label class="label">Password</label>
                <input type="password" class="input-field" value="123456">

                <div class="forgot-link">Forgot Password?</div>

                <button class="btn btn-emp">
                    <span style="font-size:18px;">👤</span> Login as Employee
                </button>

                <p class="reg-text">New employee? <span class="reg-link">Register here →</span></p>

                <div class="divider-container">
                    <div class="line"></div>
                    <span class="or-text">OR</span>
                    <div class="line"></div>
                </div>

                <button class="btn btn-partner" onclick="showScreen('partner-login')">
                    <span style="background:white; color:black; border-radius:50%; width:16px; height:16px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900;">G</span> Login as Partner
                </button>
            </div>
        </div>

        <div id="partner-login" class="screen">
